<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>וֶלָה · ניהול</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin.css?v=37" />
  </head>
  <body>
    <div id="bootView" class="boot"><span class="spin"></span></div>

    <!-- כניסה -->
    <div id="loginView" class="login" hidden>
      <form id="loginForm" class="login__card" autocomplete="off">
        <div class="login__brand">v</div>
        <div class="login__title">מערכת ניהול</div>
        <p class="login__sub">גישה מאובטחת — נפרדת מחשבונות התלמידים</p>
        <label class="login__label" for="adminPw">סיסמת ניהול</label>
        <input id="adminPw" type="password" class="login__input" autocomplete="current-password" />
        <button type="submit" class="btn btn--primary login__btn">כניסה למערכת</button>
        <div id="loginErr" class="login__err" hidden></div>
        <div id="loginNotConfigured" class="login__hint" hidden>
          לא הוגדרה סיסמת ניהול — הוסף/י <code>ADMIN_PASSWORD</code> לקובץ <code>.env</code> והפעל/י מחדש את השרת.
        </div>
      </form>
    </div>

    <!-- האפליקציה -->
    <div id="app" class="app" hidden>
      <header class="topbar">
        <div class="topbar__brand"><span class="topbar__v">v</span></div>
        <nav class="topbar__nav" id="nav">
          <span class="navSel" aria-hidden="true"></span>
          <button class="navBtn" data-view="overview">סקירה</button>
          <button class="navBtn" data-view="students">תלמידים</button>
          <button class="navBtn" data-view="content">תוכן</button>
        </nav>
        <button id="logoutBtn" class="btn btn--ghost btn--sm">יציאה</button>
      </header>
      <main id="main" class="main" aria-live="polite"></main>
    </div>

    <!-- חלון תלמיד (modal) -->
    <div id="modal" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="פרופיל תלמיד">
        <button class="modal__close" data-close aria-label="סגירה"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
        <div id="modalBody" class="modal__body"></div>
      </div>
    </div>

    <script src="/admin.js?v=30"></script>
    <!-- סטודיו שיעורי-הזהב: הלוח האמיתי (board.js) + הכלים (widget-kit) + העורך -->
    <script src="/widget-kit.js"></script>
    <script src="/board.js"></script>
    <script src="/admin-golden.js?v=2"></script>
    <!-- נושאי תלמיד: תכנית הלימודים המלאה (נתונים) + הדפדפן -->
    <script src="/curriculum-data.js?v=1"></script>
    <script src="/admin-curriculum.js?v=1"></script>
  </body>
</html>
