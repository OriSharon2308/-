<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מערכת לימוד – אבטיפוס</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=46" />
    <!-- שכבת עיצוב ילדים (רידיזיין) — נטענת אחרי styles.css, דורסת מראה+מיקומים. הסרה = חזרה למקור -->
    <link rel="stylesheet" href="./kids-theme.css?v=29" />
    <style>
      /* מקום שמור לדמות המדברת (מסקוט) בראש הצ'אט — נותן פנים למורה */
      .chatSidebar__header {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .mascotSlot {
        flex: 0 0 auto;
        width: 46px;
        height: 46px;
        padding: 0;
        border: 0;
        background: transparent;
        border-radius: 14px;
        cursor: pointer;
        transform: translateY(4px); /* יישור אנכי בפס: מעט נמוך יותר כדי שייראה ממורכז (חייב להתאים ל-REST_NUDGE ב-JS) */
        transition: transform 0.15s ease;
      }
      .mascotSlot:hover {
        transform: translateY(4px) scale(1.07);
      }
      .mascotSlot:active {
        transform: translateY(4px) scale(0.95);
      }
      .mascotSlot:focus-visible {
        outline: 2px solid #0d9488;
        outline-offset: 3px;
      }
      .mascotSlot svg {
        width: 100%;
        height: 100%;
        display: block;
        filter: drop-shadow(0 4px 10px rgba(13, 148, 136, 0.28));
        animation: mascotBob 4.5s ease-in-out infinite;
      }
      /* בפתיחה: המורה גדל ונע. הקופסה בגודל הסופי (SVG מצויר גדול → חד), והאנימציה רק על transform (GPU → חלק לגמרי, בלי reflow לכל פריים) */
      .mascotSlot.is-fly {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        transform-origin: 0 0;
        will-change: transform;
        backface-visibility: hidden;
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        /* width/height (=הגודל הסופי) נקבעים ב-JS; ה-scale בתוך transform מקטין בהתחלה */
      }
      .mascotSlot.is-fly svg {
        /* ריחוף עדין גם כשפתוח (translateY בלבד → נשאר חד). הצל מתחת (mascotFloatShadow) נע איתו */
        animation: mascotFloatBig 4.6s ease-in-out infinite;
        filter: drop-shadow(0 16px 26px rgba(13, 148, 136, 0.26));
      }
      .chatSidebar__header .chatSidebar__titleWrap {
        flex: 1 1 auto;
      }
      @keyframes mascotBob {
        50% {
          transform: translateY(-3px);
        }
      }
      @keyframes mascotFloatBig {
        50% {
          transform: translateY(-9px);
        }
      }
      .chatSidebar__inner {
        position: relative;
      }
      /* הפס הלבן האמיתי (#chatHeader) הוא שמתרחב — מעוגן ומשמש מיכל לדמות ולטקסט. לבן מלא תמיד.
         פינות תחתונות מעוגלות תמיד (כמו במצב הפתוח) → אין שינוי-פינות בפתיחה/סגירה */
      .chatSidebar__header {
        position: relative;
        background: #ffffff;
        border-radius: 0 0 26px 26px;
        box-shadow: 0 12px 26px rgba(13, 60, 53, 0.14); /* "ערפל" קבוע — גם סגור וגם פתוח (רוכב עם תחתית הריבוע) → בלי הופעה/היעלמות */
      }
      /* מצב שיחה: הפס האמיתי יוצא מהזרימה וגדל כלפי מטה לריבוע מושלם (גובה = רוחב, נקבע ב-JS).
         רק GOVAH מונפש — בלי ריפיינט יקר של צל/רדיוס לכל פריים → גלילה חלקה */
      .chatSidebar__header.is-talk {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 6;
        border: none; /* בלי קו-מסגרת תחתון (היה border-bottom שיצר פס דק חוצה-רוחב) */
        border-radius: 0;
        /* המורה יושב על אזור אטום למעלה, שהולך ונהיה שקוף כלפי מטה — מעבר רך אל אזור הטשטוש.
           מגיע לשקיפות מלאה כבר ב-86% → בלי "מדרגת" שקיפות בקצה התחתון (בלי פס) */
        background: linear-gradient(
          to bottom,
          #ffffff 0%,
          #ffffff 44%,
          rgba(255, 255, 255, 0.4) 66%,
          rgba(255, 255, 255, 0) 86%
        );
        box-shadow: none;
        overflow: hidden;
        transform: translateZ(0); /* שכבת compositor נפרדת → גלילה חלקה */
        will-change: height, transform;
        transition: height 0.62s cubic-bezier(0.16, 1, 0.3, 1);
      }
      /* הכותרת "צ'אט עם המורה" + הכתובית מתחת — נחשפות מימין לשמאל (מהקצה הימני, ליד המורה, בלי לעבור מתחתיו).
         החשיפה היא רק *אחרי* שהריבוע כבר נסגר — דרך השהיית transition-delay (לא בו-זמנית עם הסגירה) */
      .chatSidebar__title {
        font-family: "Fredoka", "Assistant", sans-serif;
        font-size: 21px;
        font-weight: 700;
        line-height: 1.1;
      }
      /* חשיפה אות-אחרי-אות (typewriter), מדורגת לפי --i, אחרי שהריבוע נסגר */
      .chatSidebar__title .ch,
      .chatSidebar__subtitle .ch {
        opacity: 1;
        transition: opacity 0.26s ease;
        transition-delay: calc(0.24s + var(--i, 0) * 0.022s);
      }
      .chatSidebar__header.is-talk .chatSidebar__title .ch,
      .chatSidebar__header.is-talk .chatSidebar__subtitle .ch {
        opacity: 0;
        transition: opacity 0.12s ease;
        transition-delay: 0s;
      }
      .chatSidebar__header .aiIndicator {
        transition: opacity 0.4s ease 0.26s;
      }
      /* בפתיחה (הסתרה) — מהיר ובלי השהיה, כדי שלא ישתהו לפני שהריבוע מכסה */
      .chatSidebar__header.is-talk .chatSidebar__titleWrap {
        clip-path: inset(0 0 0 100%); /* מוסתר; הצד הימני (ליד המורה) הוא נקודת ההתחלה של החשיפה */
        opacity: 0;
        pointer-events: none;
        transition: clip-path 0.2s ease, opacity 0.2s ease;
      }
      .chatSidebar__header.is-talk .aiIndicator {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      /* טקסט ההסבר — בתחתית הריבוע, קטן ונמוך */
      .mascotModal__text {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px; /* המיקרופון נמוך עוד יותר — קרוב לתחתית הפאנל */
        padding: 0 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
        pointer-events: none;
      }
      .mascotModal__title {
        font-family: "Fredoka", "Assistant", sans-serif;
        font-weight: 700;
        font-size: clamp(15px, 1.9vw, 19px);
        color: #0f3b36;
        margin: 0;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.14s ease, transform 0.14s ease; /* יציאה מהירה ונקייה */
      }
      .mascotModal__note {
        font-size: clamp(11.5px, 1.5vw, 13.5px);
        line-height: 1.5;
        color: #46615f;
        max-width: 32ch;
        margin: 0;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.14s ease, transform 0.14s ease; /* יציאה מהירה ונקייה */
      }
      /* כניסה — איטית וחלקה עם השהיה (אחרי שהריבוע כבר נפתח) */
      .chatSidebar__header.is-open .mascotModal__title {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.4s ease 0.28s,
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.28s;
      }
      .chatSidebar__header.is-open .mascotModal__note {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.4s ease 0.36s,
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.36s;
      }
      /* כפתור המיקרופון — "דברו עם המורה" */
      /* רק צורת המיקרופון — בלי עיגול רקע */
      .voiceMic {
        pointer-events: auto;
        width: 48px;
        height: 48px;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 0;
        cursor: pointer;
        display: grid;
        place-items: center;
        color: #0d9488; /* צבע הסמל */
        opacity: 0;
        transform: translateY(10px) scale(0.9);
        transition: opacity 0.14s ease, transform 0.14s ease, color 0.2s ease;
      }
      .voiceMic__icon {
        width: 32px;
        height: 32px;
        display: block;
        filter: drop-shadow(0 4px 8px rgba(13, 148, 136, 0.28));
      }
      .chatSidebar__inner.is-voice .voiceMic {
        opacity: 1;
        transform: translateY(0) scale(1);
        transition: opacity 0.4s ease 0.44s,
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.44s;
      }
      /* המיקרופון יושב בתחתית אזור הערפל — מתחת לקו ולטקסט של המורה */
      .voiceFog__mic {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 34px;
        display: grid;
        place-items: center;
        pointer-events: none; /* רק הכפתור עצמו לחיץ */
      }
      .voiceMic:hover {
        transform: scale(1.06);
      }
      .voiceMic:active {
        transform: scale(0.95);
      }
      /* מצב הקלטה — הסמל אדום ופועם (בלי עיגול) */
      .voiceMic.is-recording {
        color: #ef4444;
        animation: voicePulse 1.3s ease-in-out infinite;
      }
      .voiceMic.is-speaking {
        color: #14b8a6;
      }
      @keyframes voicePulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.12);
          opacity: 0.72;
        }
      }
      /* מצב "חושב/מתמלל" — מעומעם ולא לחיץ */
      .voiceMic.is-busy {
        opacity: 0.55;
        pointer-events: none;
      }
      /* לואדר חמוד — נקודות קופצות צבעוניות בזמן טעינת הקול */
      .voiceLoader {
        display: flex;
        gap: 7px;
        align-items: flex-end;
        justify-content: center;
        height: 16px;
        margin: 2px 0;
      }
      .voiceLoader[hidden] {
        display: none;
      }
      .voiceLoader span {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #14b8a6;
        animation: voiceBounce 0.9s ease-in-out infinite;
      }
      .voiceLoader span:nth-child(2) {
        background: #f6b73c;
        animation-delay: 0.15s;
      }
      .voiceLoader span:nth-child(3) {
        background: #ff7a59;
        animation-delay: 0.3s;
      }
      @keyframes voiceBounce {
        0%,
        70%,
        100% {
          transform: translateY(0) scale(0.85);
          opacity: 0.55;
        }
        35% {
          transform: translateY(-9px) scale(1);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .voiceLoader span {
          animation: none;
        }
      }
      /* ===== שיחה בקול: ערפל מטשטש על הצ'אט מתחת + תגובת המורה (טייפרייטר) במרכז ===== */
      /* הטשטוש עולה בהדרגה יחד עם פתיחת הריבוע */
      #chatLog,
      .chatComposer {
        transition: filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .chatSidebar__inner.is-voice #chatLog,
      .chatSidebar__inner.is-voice .chatComposer {
        filter: blur(7px);
        pointer-events: none;
        user-select: none;
      }
      /* שכבת הערפל — מתחת לריבוע (z6) ומעל הצ'אט המטושטש. ממוקמת בדיוק מתחת לריבוע */
      .voiceFog {
        position: absolute;
        left: 0;
        right: 0;
        top: var(--squareH, 42%);
        bottom: 0;
        z-index: 5;
        overflow: hidden; /* תשובה ארוכה במיוחד לא תגלוש מתחתית הריבוע */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 22px 26px 32px;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        /* "גל" שעובר מלמעלה למטה — נחשף בהדרגה כלפי מטה, מעל הצ'אט שכבר מטושטש */
        clip-path: inset(0 0 100% 0);
        transition: opacity 0.4s ease, clip-path 0.72s cubic-bezier(0.16, 1, 0.3, 1);
        /* מתחיל שקוף לגמרי למעלה → בלי "פס" אטום חוצה-רוחב בקצה העליון */
        background: linear-gradient(
          to bottom,
          rgba(245, 250, 249, 0) 0%,
          rgba(245, 250, 249, 0.5) 34%,
          rgba(245, 250, 249, 0.66) 100%
        );
      }
      .chatSidebar__inner.is-voice .voiceFog {
        opacity: 1;
        clip-path: inset(0 0 0 0); /* הגל עולה על כל אזור הצ'אט */
      }
      /* קו-הפרדה קצר ועדין — מסמן ברכות איפה מתחיל אזור הטקסט (לא מגיע לפינות) */
      .voiceFog::before {
        content: "";
        position: absolute;
        top: 9px;
        left: 50%;
        width: 52%;
        height: 1.5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 1px 4px rgba(13, 60, 53, 0.08);
        transform: translateX(-50%);
      }
      /* תגובת המורה — עולה במרכז ונחשפת אות-אחר-אות (כמו בבועת הצ'אט), בלי סמן מציק */
      .voiceFog__reply {
        margin: 0;
        font-family: "Fredoka", "Assistant", sans-serif;
        font-weight: 600;
        font-size: clamp(16px, 2.3vw, 21px);
        line-height: 1.55;
        color: #0f3b36;
        /* הילה לבנה רכה — קריאות מעל הצ'אט המטושטש (שעשוי להיות צבעוני) */
        text-shadow: 0 1px 10px #f5faf9, 0 0 3px #f5faf9;
        max-width: 28ch;
        max-height: 100%;
        overflow: hidden;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .voiceFog__reply.is-shown {
        opacity: 1;
        transform: translateY(0);
      }
      .voiceFog__reply .ch {
        opacity: 0;
      }
      .voiceFog__reply .ch--on {
        animation: charReveal 0.5s ease-out both; /* אותו אפקט הבהוב-זוהר תכלת כמו בצ'אט */
      }
      @media (prefers-reduced-motion: reduce) {
        .voiceFog,
        .voiceFog__reply,
        #chatLog,
        .chatComposer {
          transition: none; /* הטשטוש מופעל מיידית, בלי הנפשה */
        }
        .voiceFog__reply .ch {
          opacity: 1;
        }
        .voiceFog__reply .ch--on {
          animation: none;
        }
      }
      /* X קטן בלי מסגרת */
      .mascotModal__close {
        position: absolute;
        top: 12px;
        left: 14px;
        width: 32px;
        height: 32px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #5f7a77;
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
        z-index: 3;
        transition: color 0.15s ease, transform 0.15s ease, opacity 0.14s ease; /* יציאה מהירה */
      }
      .chatSidebar__header.is-open .mascotModal__close {
        opacity: 1;
        pointer-events: auto;
        transition: opacity 0.3s ease 0.32s; /* כניסה עם השהיה */
      }
      .mascotModal__close:hover {
        color: #0f3b36;
        transform: scale(1.14);
      }
      /* ===== סמלים מרחפים מסביב למורה (כמו בדף הבית) + צל-קרקע מרחף ===== */
      .mascotOrbit {
        position: absolute;
        inset: 0;
        pointer-events: none;
        /* DOM-first + z-auto → מאחורי המורה (z2) ומאחורי הטקסט; נגזר ע"י overflow:hidden של הריבוע */
      }
      /* כל סמל: עוטף (כניסת קפיצה מדורגת) > באדג' (ריחוף אינסופי) — שני transforms נפרדים, בלי התנגשות */
      .orbitSym {
        position: absolute;
        opacity: 0;
        transform: scale(0.25);
        transition: opacity 0.16s ease, transform 0.18s ease; /* יציאה מהירה ונקייה */
      }
      .chatSidebar__header.is-open .orbitSym {
        opacity: 1;
        transform: scale(0.8); /* סמלים קטנים יותר — מתאים לפאנל הקטן */
        /* כניסת "קפיצה" מדורגת (back-out עדין), אחת אחרי השנייה לפי --d */
        transition: opacity 0.4s ease var(--d, 0s),
          transform 0.5s cubic-bezier(0.34, 1.45, 0.55, 1) var(--d, 0s);
      }
      .orbitSym__b {
        display: grid;
        place-items: center;
        font-family: "Fredoka", "Assistant", sans-serif;
        font-weight: 700;
        line-height: 1;
        animation: orbitFloat var(--dur, 4.4s) ease-in-out var(--fd, 0s) infinite;
      }
      @keyframes orbitFloat {
        0%,
        100% {
          transform: translateY(0) rotate(var(--r, 0deg));
        }
        50% {
          transform: translateY(-8px) rotate(var(--r, 0deg));
        }
      }
      /* וריאנטים — צבעי דף הבית */
      .orbitSym__b--plus {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #ff7a59;
        color: #fff;
        font-size: 21px;
        box-shadow: 0 6px 14px rgba(255, 122, 89, 0.34);
      }
      .orbitSym__b--seven {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        background: #f6b73c;
        color: #fff;
        font-size: 17px;
        box-shadow: 0 6px 14px rgba(246, 183, 60, 0.34);
      }
      .orbitSym__b--star {
        color: #fbbf24;
        font-size: 27px;
        filter: drop-shadow(0 4px 8px rgba(251, 191, 36, 0.4));
      }
      .orbitSym__b--times {
        color: rgba(13, 148, 136, 0.62);
        font-size: 27px;
      }
      .orbitSym__b--tri {
        color: #8b7cf0;
        font-size: 26px;
        filter: drop-shadow(0 4px 8px rgba(139, 124, 240, 0.34));
      }
      .orbitSym__b--eq {
        color: #0d9488;
        font-size: 27px;
      }
      /* צל-קרקע מתחת למורה — מרחף: נע מעט ימינה/שמאלה ופועם, כאילו המורה צף */
      .mascotFloatShadow {
        position: absolute;
        top: 66%;
        left: 50%;
        width: min(38%, 140px);
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(
          ellipse at center,
          rgba(13, 60, 53, 0.26),
          rgba(13, 60, 53, 0) 70%
        );
        transform: translateX(-50%);
        opacity: 0;
        transition: opacity 0.4s ease 0.22s;
      }
      .chatSidebar__header.is-open .mascotFloatShadow {
        opacity: 1;
        animation: floatShadow 4.6s ease-in-out infinite;
      }
      @keyframes floatShadow {
        0%,
        100% {
          transform: translateX(-50%) translateX(-7px) scaleX(0.9);
          opacity: 0.85;
        }
        50% {
          transform: translateX(-50%) translateX(7px) scaleX(1.08);
          opacity: 0.55;
        }
      }
      /* ===== שלב 4: אנימציית דיבור — הדמות "מדברת": פה נפתח/נסגר, ניתור חי, זוהר רך, צל מגיב ===== */
      .mascotMouthG {
        transform-box: fill-box;
        transform-origin: center;
        opacity: 0; /* מוסתר במנוחה (החיוך מוצג) */
        transition: opacity 0.12s ease;
      }
      .mascotSmile {
        transition: opacity 0.12s ease;
      }
      /* במנוחה: חיוך מוצג, פה-דיבור מוסתר. בזמן דיבור — מתחלפים, והפה פועם */
      .chatSidebar__header.is-speaking .mascotSmile {
        opacity: 0;
      }
      .chatSidebar__header.is-speaking .mascotMouthG {
        opacity: 1;
        animation: mascotTalk 0.46s ease-in-out infinite;
      }
      /* גוף: ניתור חי + סקייל זעיר (מחליף את הריחוף האיטי) + זוהר תכלת רך פועם — שני אנימציות מתחברות (transform + filter) */
      .chatSidebar__header.is-speaking .mascotSlot svg {
        animation: mascotSpeak 0.9s ease-in-out infinite, mascotGlow 1.5s ease-in-out infinite;
      }
      .chatSidebar__header.is-speaking .mascotFloatShadow {
        animation: floatShadowTalk 0.9s ease-in-out infinite; /* הצל פועם יחד עם הניתור */
      }
      @keyframes mascotTalk {
        0%   { transform: scaleY(0.32); }
        20%  { transform: scaleY(1); }
        38%  { transform: scaleY(0.55); }
        54%  { transform: scaleY(0.92); }
        70%  { transform: scaleY(0.42); }
        86%  { transform: scaleY(0.8); }
        100% { transform: scaleY(0.36); }
      }
      @keyframes mascotSpeak {
        0%   { transform: translateY(0) scale(1); }
        25%  { transform: translateY(-4px) scale(1.014); }
        50%  { transform: translateY(-1px) scale(1.004); }
        75%  { transform: translateY(-5px) scale(1.018); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes mascotGlow {
        0%, 100% { filter: drop-shadow(0 14px 24px rgba(13, 148, 136, 0.28)); }
        50%      { filter: drop-shadow(0 16px 32px rgba(34, 211, 192, 0.55)); }
      }
      @keyframes floatShadowTalk {
        0%, 100% { transform: translateX(-50%) scaleX(0.9); opacity: 0.85; }
        50%      { transform: translateX(-50%) scaleX(1.08); opacity: 0.5; }
      }
      @media (prefers-reduced-motion: reduce) {
        .chatSidebar__header.is-speaking .mascotMouthG,
        .chatSidebar__header.is-speaking .mascotSlot svg,
        .chatSidebar__header.is-speaking .mascotFloatShadow {
          animation: none;
        }
        .chatSidebar__header.is-speaking .mascotMouthG { opacity: 1; transform: scaleY(0.7); }
      }
      @media (prefers-reduced-motion: reduce) {
        .mascotSlot svg {
          animation: none;
        }
        .chatSidebar__header.is-talk,
        .mascotSlot.is-fly,
        .mascotModal__title,
        .mascotModal__note,
        .mascotModal__close {
          transition: opacity 0.18s ease;
        }
        .mascotModal__title,
        .mascotModal__note {
          transform: none;
        }
        /* בלי דירוג typewriter — כל האותיות יחד */
        .chatSidebar__title .ch,
        .chatSidebar__subtitle .ch {
          transition: opacity 0.15s ease;
          transition-delay: 0s;
        }
        /* סמלים מרחפים + צל + ריחוף המורה — בלי תנועה: הופעה רגועה בלבד */
        .mascotSlot.is-fly svg,
        .orbitSym__b,
        .chatSidebar__header.is-open .mascotFloatShadow {
          animation: none;
        }
        .orbitSym {
          transition: opacity 0.18s ease;
          transform: none;
        }
        .chatSidebar__header.is-open .orbitSym {
          transition: opacity 0.18s ease;
          transform: scale(0.8);
        }
      }
    </style>
  </head>
  <body>
    <div class="appWord" aria-hidden="true">vela</div>
    <header class="topbar">
      <div class="topbar__left">
        <span id="userChip" class="userChip" hidden>
          <span class="userChip__icon" aria-hidden="true">👤</span>
          <span id="userChipName" class="userChip__name"></span>
        </span>
      </div>
      <!-- study-v2: מד הרמה + הקושי בטופ-בר, בין הבורגר לבית (לא בתוך חלון השאלה) -->
      <div class="topbar__center" id="topbarCenter">
        <div id="levelMeter" class="levelMeter" hidden>
          <span class="levelMeter__label">רמה <span id="meterLevel">1</span></span>
          <div class="levelMeter__track">
            <div class="levelMeter__fill" id="meterFill"></div>
            <span class="levelMeter__count"><span id="meterDone">0</span> / <span id="meterTotal">0</span></span>
          </div>
        </div>
        <button class="pill pill--btn" id="difficultyPill" type="button" title="רמת קושי — לחצו לבחירת רמה" aria-haspopup="menu" aria-expanded="false">רמה: 1</button>
        <div id="levelPicker" class="levelPicker" role="menu" aria-label="בחירת רמה" hidden></div>
      </div>
      <div class="topbar__right">
        <a href="/home" class="homeIcon" id="homeBtn" aria-label="דף הבית" title="דף הבית">🏠</a>
      </div>
    </header>

    <div id="topicsOverlay" class="overlay"></div>
    <aside id="topicsDrawer" class="drawer" role="dialog" aria-label="נושאי תרגול" aria-modal="true" tabindex="-1">
      <button id="topicsBtn" class="burger drawer__burger" type="button" aria-label="פתיחה/סגירה של תפריט נושאים" aria-haspopup="dialog" aria-expanded="false">
        <span class="burger__line" aria-hidden="true"></span>
        <span class="burger__line" aria-hidden="true"></span>
        <span class="burger__line" aria-hidden="true"></span>
      </button>
      <div class="drawer__header">
        <div>
          <div class="drawer__title">נושאי תרגול</div>
          <div class="drawer__subtitle">כל נושא עם צ’אט ושאלות משלו</div>
        </div>
      </div>
      <div class="drawer__content">
        <!-- תצוגה 1: הנושאים שכבר נפתחו -->
        <div id="topicsListView">
          <div class="drawer__actions">
            <button id="newTopicBtn" class="btn btn--primary" type="button">+ נושא חדש</button>
          </div>
          <div id="topicsList" class="topicsList" aria-label="רשימת נושאים"></div>
        </div>

        <!-- תצוגה 2: בורר נושאי הכיתה (נפתח מ"נושא חדש") -->
        <div id="topicPickerView" hidden>
          <div class="drawer__actions">
            <button id="pickerBackBtn" class="btn btn--secondary" type="button">→ חזרה</button>
          </div>
          <div class="pickerHint">בחר/י נושא מהכיתה שלך:</div>
          <div id="topicPicker" class="topicsList" aria-label="נושאי הכיתה"></div>
        </div>
      </div>
    </aside>

    <main class="layout study-v2">
      <button
        id="chatToggleBtn"
        class="chatToggle"
        type="button"
        aria-label="פתיחה/סגירה של הצ’אט"
        aria-expanded="true"
      >
        <span class="chatToggle__icon" aria-hidden="true">◀</span>
      </button>

      <aside id="chatSidebar" class="chatSidebar" aria-label="צ’אט חופשי">
        <div id="chatResizeHandle" class="chatResizeHandle" role="separator" aria-orientation="vertical" aria-label="שינוי רוחב הצ’אט"></div>
        <div class="chatSidebar__inner">
          <div class="chatSidebar__header" id="chatHeader">
            <!-- סמלים מרחפים מסביב למורה + צל-קרקע מרחף (נחשפים בקפיצה מדורגת כשהריבוע נפתח). דקורטיבי -->
            <div class="mascotOrbit" aria-hidden="true">
              <span class="mascotFloatShadow"></span>
              <!-- מסלול מאוזן סביב המורה: שעון 12·2·4·6·8·10 — זוגות שמאל/ימין מראה זה לזה, בגובה ובמרחק זהים -->
              <span class="orbitSym" style="top:10%;left:46%;--d:0.36s"><span class="orbitSym__b orbitSym__b--plus" style="--dur:4.2s;--fd:0s">+</span></span>
              <span class="orbitSym" style="top:27%;left:72%;--d:0.44s"><span class="orbitSym__b orbitSym__b--star" style="--dur:5.2s;--fd:0.2s">★</span></span>
              <span class="orbitSym" style="top:61%;left:72%;--d:0.52s"><span class="orbitSym__b orbitSym__b--eq" style="--dur:4.0s;--fd:0.6s">=</span></span>
              <span class="orbitSym" style="top:78%;left:46%;--d:0.60s"><span class="orbitSym__b orbitSym__b--seven" style="--dur:4.8s;--fd:0.35s;--r:8deg">7</span></span>
              <span class="orbitSym" style="top:61%;left:20%;--d:0.68s"><span class="orbitSym__b orbitSym__b--tri" style="--dur:4.5s;--fd:1.2s">▲</span></span>
              <span class="orbitSym" style="top:27%;left:20%;--d:0.76s"><span class="orbitSym__b orbitSym__b--times" style="--dur:3.8s;--fd:0.9s">×</span></span>
            </div>
            <!-- דמות המורה (מסקוט Vela). לחיצה מרחיבה את הפס הלבן עצמו לריבוע, והמורה גדל וזז למרכז -->
            <button class="mascotSlot" id="mascotSlot" type="button" aria-label="המורה שלי — לחצו לפתיחה" aria-haspopup="dialog">
              <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                  <linearGradient id="mTeal" x1="0" y1="0" x2="0.35" y2="1">
                    <stop offset="0" stop-color="#22d3c0" /><stop offset="1" stop-color="#0d9488" />
                  </linearGradient>
                  <radialGradient id="mGloss" cx="0.5" cy="0.26" r="0.72">
                    <stop offset="0" stop-color="#ffffff" stop-opacity="0.5" /><stop offset="0.62" stop-color="#ffffff" stop-opacity="0" />
                  </radialGradient>
                </defs>
                <rect x="7" y="8" width="50" height="48" rx="19" fill="url(#mTeal)" />
                <rect x="7" y="8" width="50" height="48" rx="19" fill="url(#mGloss)" />
                <circle cx="20" cy="40" r="3.8" fill="#ff9d73" opacity="0.45" />
                <circle cx="44" cy="40" r="3.8" fill="#ff9d73" opacity="0.45" />
                <circle cx="25" cy="30" r="6.2" fill="#fff" /><circle cx="26" cy="31" r="3" fill="#0f3b36" /><circle cx="24.3" cy="29.3" r="1.1" fill="#fff" />
                <circle cx="43" cy="30" r="6.2" fill="#fff" /><circle cx="44" cy="31" r="3" fill="#0f3b36" /><circle cx="42.3" cy="29.3" r="1.1" fill="#fff" />
                <path class="mascotSmile" d="M25 43 Q34 50 43 43" fill="none" stroke="#0f3b36" stroke-width="3" stroke-linecap="round" />
                <g class="mascotMouthG">
                  <ellipse cx="34" cy="45.5" rx="5" ry="3.4" fill="#0f3b36" />
                  <ellipse cx="34" cy="47.1" rx="2.4" ry="1.4" fill="#ff8a73" />
                </g>
                <path d="M52.5 15 l1.2 2.7 2.7 1.2 -2.7 1.2 -1.2 2.7 -1.2 -2.7 -2.7 -1.2 2.7 -1.2 z" fill="#fff" opacity="0.92" />
              </svg>
            </button>
            <div class="chatSidebar__titleWrap">
              <div class="chatSidebar__title">צ’אט עם המורה</div>
            </div>
            <div class="aiIndicator" id="aiIndicator" title="סטטוס AI">
              <span class="aiIndicator__dot" id="aiDot" aria-hidden="true"></span>
              <span class="aiIndicator__label">AI</span>
            </div>

            <!-- מצב "שיחה": כשהפס הלבן עצמו גדל לריבוע — כפתור סגירה + טקסט הסבר -->
            <button class="mascotModal__close" id="mascotModalClose" type="button" aria-label="סגירה">×</button>
            <div class="mascotModal__text" id="mascotModal" role="dialog" aria-modal="true" aria-label="המורה שלי" aria-hidden="true">
              <p class="mascotModal__note" id="voiceStatus"></p>
            </div>
          </div>

          <div id="chatLog" class="chatLog" aria-label="היסטוריית שיחה"></div>

          <div class="chatComposer">
            <label class="field field--full">
              <span class="field__label">כתוב/י כאן</span>
              <textarea
                id="chatInput"
                class="textarea"
                rows="2"
                placeholder="לדוגמה: לא הבנתי למה עושים קודם כפל…"
              ></textarea>
            </label>
            <button id="sendBtn" class="composerSend" type="button" aria-label="שיחה קולית עם המורה">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor" />
                <path d="M5.5 11a6.5 6.5 0 0 0 13 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="12" y1="17.5" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="8.5" y1="21" x2="15.5" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <!-- שיחה בקול: ערפל על הצ'אט + תגובת המורה (טעינה ואז טייפרייטר) במרכז האזור המטושטש -->
          <div class="voiceFog" id="voiceFog" aria-hidden="true">
            <div class="voiceLoader" id="voiceFogLoader" hidden aria-hidden="true"><span></span><span></span><span></span></div>
            <p class="voiceFog__reply" id="voiceReply"></p>
            <div class="voiceFog__mic">
              <button class="voiceMic" id="voiceMic" type="button" aria-label="דברו עם המורה — לחצו והתחילו לדבר">
                <svg class="voiceMic__icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="2.5" width="6" height="11" rx="3" fill="currentColor" />
                  <path d="M5.5 11a6.5 6.5 0 0 0 13 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <line x1="12" y1="17.5" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <line x1="8.5" y1="21" x2="15.5" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <section class="panel lesson" aria-label="תרגול מודרך">
        <div class="panel__header">
          <h2 class="panel__title">
            התרגיל שלך <span id="topicLabel" class="panel__titleSub"></span>
          </h2>
        </div>

        <div class="card" id="lessonCard">
          <div id="solvedBadge" class="solvedBadge" title="פתרת את השאלה הזו" hidden>✓</div>
          <button id="helpBtn" class="helpBtn helpBtn--corner" type="button" aria-label="איך משתמשים" hidden>?</button>
          <div id="helpPopover" class="helpPopover" hidden></div>
          <!-- study-v2: חצי-זווית עדינים בצדי הריבוע (קודם/הבא) — SVG שנמתח לגובה עם קו אחיד -->
          <button class="qNav qNav--prev" id="qNavPrev" type="button" aria-label="שאלה קודמת">
            <svg class="qNav__chev" viewBox="0 0 20 100" preserveAspectRatio="none" aria-hidden="true"><polyline points="4,14 16,50 4,86" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" /></svg>
          </button>
          <button class="qNav qNav--next" id="qNavNext" type="button" aria-label="שאלה הבאה">
            <svg class="qNav__chev" viewBox="0 0 20 100" preserveAspectRatio="none" aria-hidden="true"><polyline points="16,14 4,50 16,86" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" /></svg>
          </button>
          <div class="problem">
            <div id="problemDiagram" class="problemDiagram" hidden aria-hidden="true"></div>
            <div class="problem__label">שאלה</div>
            <div class="problem__text" id="problemText">טוען…</div>
          </div>

          <!-- קלט רגיל: מספר אחד — בר אחד שעוטף את הכפתור -->
          <div class="answerRow" id="answerRowNumeric">
            <div class="answerBar">
              <input id="answerInput" class="answerBar__input" inputmode="numeric" autocomplete="off" placeholder="התשובה שלי" />
              <button id="checkBtn" class="answerBar__btn" type="button">סיימתי</button>
            </div>
          </div>

          <!-- קלט שעה: שעות : דקות -->
          <div class="answerRow answerRow--time" id="answerRowTime" hidden>
            <div class="timeInput">
              <label class="field timeInput__field">
                <span class="field__label">שעות</span>
                <input id="timeHour" class="input input--time" inputmode="numeric" autocomplete="off" min="1" max="12" placeholder="3" />
              </label>
              <span class="timeInput__colon" aria-hidden="true">:</span>
              <label class="field timeInput__field">
                <span class="field__label">דקות</span>
                <input id="timeMin" class="input input--time" inputmode="numeric" autocomplete="off" min="0" max="59" placeholder="30" />
              </label>
            </div>
            <button id="checkTimeBtn" class="btn btn--primary" type="button">בדוק</button>
          </div>

          <!-- קלט אינטראקטיבי: גוררים מחוגים ולוחצים "סיימתי" -->
          <div class="answerRow answerRow--interactive" id="answerRowInteractive" hidden>
            <div class="interactiveHint" id="interactiveHint">הזיזו את המחוגים על השעון למעלה ולחצו "סיימתי"</div>
            <button id="doneBtn" class="btn btn--primary" type="button">סיימתי</button>
          </div>

          <div class="actions">
            <button id="prevProblemBtn" class="btn btn--secondary" type="button">שאלה קודמת</button>
            <button id="nextProblemBtn" class="btn btn--secondary" type="button">שאלה הבאה</button>
            <button id="hintBtn" class="btn btn--secondary" type="button">רמז</button>
            <button id="explainBtn" class="btn btn--secondary" type="button">הסבר</button>
          </div>

          <div class="feedback feedback--hidden" id="feedbackBox" role="status" aria-live="polite" hidden></div>
        </div>

        <!-- כרטיס יצירת צורות: לוח משבצות לציור עם העכבר (מחליף את הכרטיס הרגיל) -->
        <div class="card shapeCreatorCard" id="shapeCreatorCard" hidden>
          <div id="shapeBoard" class="shapeBoard" aria-label="לוח ציור צורות"></div>
          <div class="shapeCreator__request" id="shapeRequest">צייר/י צורה</div>
          <div class="shapeCreator__actions">
            <button id="shapeDoneBtn" class="btn btn--primary" type="button">סיימתי</button>
            <button id="shapeClearBtn" class="btn btn--secondary" type="button">נסה שוב</button>
          </div>
        </div>

      </section>
    </main>

    <!-- study-v2: אווטאר מורה קטן בפינה שמאל-למטה — פתיחת הצ'אט עם המורה -->
    <button class="teacherDock" id="teacherDock" type="button" aria-label="המורה — פתיחת צ'אט">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="tdTeal" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#22d3c0" /><stop offset="1" stop-color="#0d9488" /></linearGradient>
        </defs>
        <rect x="7" y="8" width="50" height="48" rx="19" fill="url(#tdTeal)" />
        <circle cx="25" cy="30" r="6.2" fill="#fff" /><circle cx="26" cy="31" r="3" fill="#0f3b36" />
        <circle cx="43" cy="30" r="6.2" fill="#fff" /><circle cx="44" cy="31" r="3" fill="#0f3b36" />
        <path d="M25 43 Q34 50 43 43" fill="none" stroke="#0f3b36" stroke-width="3" stroke-linecap="round" />
      </svg>
    </button>

    <!-- חלונית: סיימת את כל שאלות הרמה -->
    <div id="levelDonePrompt" class="levelDone" hidden>
      <div class="levelDone__box">
        <div class="levelDone__title">כל הכבוד! 🎉</div>
        <div class="levelDone__msg">פתרת את כל השאלות שיש כרגע ברמה <span id="doneLevel">1</span>! מה עכשיו?</div>
        <div class="levelDone__actions">
          <button id="levelNextBtn" class="btn btn--primary" type="button">לעלות רמה ⬆️</button>
          <button id="levelStayBtn" class="btn btn--secondary" type="button">להמשיך ברמה זו 🔄</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="small muted">מערכת לימוד — תרגול עם מורה AI</div>
    </footer>

    <div class="agentDebug" id="agentDebug">
      <button type="button" class="agentDebug__toggle" id="agentDebugToggle" aria-expanded="false">
        <span>סוכנים (זמני)</span>
        <span class="agentDebug__arrow" id="agentDebugArrow" aria-hidden="true">▲</span>
      </button>
      <div class="agentDebug__body" id="agentDebugBody" hidden></div>
    </div>

    <!-- מקלדת מספרים — נפתחת בלחיצה על שדה התשובה -->
    <div id="numPad" class="numPad" role="dialog" aria-label="מקלדת מספרים" hidden>
      <div class="numPad__grid">
        <button type="button" class="numKey" data-k="7">7</button>
        <button type="button" class="numKey" data-k="8">8</button>
        <button type="button" class="numKey" data-k="9">9</button>
        <button type="button" class="numKey" data-k="4">4</button>
        <button type="button" class="numKey" data-k="5">5</button>
        <button type="button" class="numKey" data-k="6">6</button>
        <button type="button" class="numKey" data-k="1">1</button>
        <button type="button" class="numKey" data-k="2">2</button>

    <script src="./app.js?v=50" defer></script>

    <!-- חלונית המורה: הפס הלבן האמיתי (#chatHeader) גדל כלפי מטה לריבוע, והמורה גדל (width/height — חד) ונע למרכז. סגירה ב-X / Esc -->
    <script>
      (function () {
        var slot = document.getElementById("mascotSlot");
        var header = document.getElementById("chatHeader");
        var dialog = document.getElementById("mascotModal");
        var closeBtn = document.getElementById("mascotModalClose");
        if (!slot || !header) return;

        /* פיצול הכותרת + הכתובית לתווים, עם אינדקס רץ (--i) — לחשיפה אות-אחרי-אות בסגירה */
        (function splitLetters() {
          var els = [
            header.querySelector(".chatSidebar__title"),
            header.querySelector(".chatSidebar__subtitle"),
          ];
          var idx = 0;
          for (var e = 0; e < els.length; e++) {
            var el = els[e];
            if (!el || el.getAttribute("data-split")) continue;
            var text = el.textContent;
            el.textContent = "";
            for (var i = 0; i < text.length; i++) {
              var span = document.createElement("span");
              span.className = "ch";
              span.textContent = text[i];
              span.style.setProperty("--i", idx++);
              el.appendChild(span);
            }
            el.setAttribute("data-split", "1");
          }
        })();

        var MASCOT = 46; /* גודל הכפתור בפס העליון */
        var REST_NUDGE = 4; /* ההזזה האנכית של המורה בפס במנוחה (translateY ב-CSS) — נכלל בנקודת ההתחלה של התעופה */
        var DUR = 570; /* משך הסגירה (ms) — מעט יותר מ-0.55s, כדי שהכל יתואם לפני הסרת is-talk */
        var settleTimer = null;
        var inner = header.parentNode; /* .chatSidebar__inner */
        var startLeft = 0,
          startTop = 0,
          collapsedH = 0,
          big = 0,
          openH = 0,
          startTf = "",
          endTf = "";

        function cancelSettle() {
          if (settleTimer) {
            clearTimeout(settleTimer);
            settleTimer = null;
          }
        }
        function reduced() {
          return (
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches
          );
        }
        /* מחשב את צלע הריבוע ואת שתי מצבי ה-transform של המורה (פינה-קטן ↔ מרכז-גדול) */
        function compute() {
          var side = header.offsetWidth; /* רוחב העמודה */
          big = Math.min(side * 0.38, 150); /* המורה קטן יותר (כדי שהפאנל יהיה קטן) */
          /* אזור קטן: מורה למעלה + מיקרופון מתחתיו + שוליים — לא ריבוע ענק. שאר הצ'אט מטושטש מתחת */
          openH = Math.round(big + 122);
          var endLeft = Math.round((side - big) / 2); /* ממורכז אופקית */
          var endTop = 58; /* המורה נמוך עוד — יותר אוויר בראש הפאנל */
          /* transform-origin 0 0: הקופסה בגודל big; scale מקטין מהפינה, translate ממקם */
          startTf =
            "translate(" + startLeft + "px," + startTop + "px) scale(" + MASCOT / big + ")";
          endTf = "translate(" + endLeft + "px," + endTop + "px) scale(1)";
          return side;
        }
        function open() {
          cancelSettle();
          /* מודדים מיקום הכפתור וגובה הפס לפני המעבר (רק אם עוד לא במצב שיחה) */
          if (!header.classList.contains("is-talk")) {
            collapsedH = header.offsetHeight;
            startLeft = slot.offsetLeft; /* מדויק, בלי הושפעות מ-scale של hover */
            startTop = slot.offsetTop + REST_NUDGE; /* כולל את ההזזה האנכית של המנוחה → אין קפיצה בפתיחה/סגירה */
          }
          var side = compute();

          /* מצב התחלה — ללא אנימציה: הקופסה בגודל הסופי (SVG חד) אך מוקטנת בפינה (transform); הפס בגובה הסגור */
          header.classList.add("is-talk");
          if (inner) inner.style.paddingTop = collapsedH + "px"; /* שומר מקום — הצ'אט לא קופץ */
          slot.classList.add("is-fly");
          header.style.transition = "none";
          slot.style.transition = "none";
          header.style.height = collapsedH + "px";
          slot.style.width = big + "px";
          slot.style.height = big + "px";
          slot.style.transform = startTf;

          void header.getBoundingClientRect(); /* commit reflow */

          /* מצב סוף — רק גובה (פס) ו-transform (מורה/GPU) מונפשים → חלק לגמרי, בלי ריפיינט יקר */
          var t = reduced() ? "none" : "";
          header.style.transition = t;
          slot.style.transition = t;
          header.style.height = openH + "px"; /* פאנל קטן — לא ריבוע מלא */
          slot.style.transform = endTf;
          header.classList.add("is-open");
          if (dialog) dialog.setAttribute("aria-hidden", "false");
          /* ערפל הצ'אט: מפרסמים את גובה הפאנל (כדי שהטקסט יֵשב מתחתיו) + גל הטשטוש */
          if (inner) {
            inner.style.setProperty("--squareH", openH + "px");
            inner.classList.add("is-voice");
          }
        }
        var EXIT = "cubic-bezier(0.4, 0, 0.2, 1)"; /* יציאה חלקה ונקייה (בלי "תקיעה" בסוף) */
        function close() {
          cancelSettle();
          header.classList.remove("is-open"); /* טקסט+X נעלמים מהר; הכותרת המקורית עדיין מוסתרת */
          if (inner) inner.classList.remove("is-voice"); /* הערפל מתפוגג יחד עם סגירת הריבוע */
          if (reduced()) {
            header.style.transition = "none";
            slot.style.transition = "none";
          } else {
            header.style.transition = "height 0.55s " + EXIT; /* הפס מתכווץ חלק */
            slot.style.transition = "transform 0.55s " + EXIT; /* המורה חוזר לפינה חלק */
          }
          header.style.height = collapsedH + "px";
          slot.style.transform = startTf;
          if (dialog) dialog.setAttribute("aria-hidden", "true");

          settleTimer = setTimeout(function () {
            /* איפוס מיידי (transition:none + reflow) → אין אנימציית-בסיס שמקפיצה את המורה הצידה.
               המורה נשאר בדיוק במקומו (הפינה) והפס חוזר למלבן ללא קפיצה */
            header.style.transition = "none";
            slot.style.transition = "none";
            header.classList.remove("is-talk");
            if (inner) inner.style.paddingTop = "";
            slot.classList.remove("is-fly");
            header.style.height = "";
            slot.style.width = "";
            slot.style.height = "";
            slot.style.transform = "";
            void header.getBoundingClientRect(); /* commit מיידי לפני שחזור המעברים */
            header.style.transition = "";
            slot.style.transition = "";
            settleTimer = null;
          }, DUR);
        }
        function toggle() {
          if (header.classList.contains("is-open")) close();
          else open();
        }
        slot.addEventListener("click", toggle);
        if (closeBtn) closeBtn.addEventListener("click", close);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && header.classList.contains("is-open")) close();
        });
        /* שמירה על ריבוע מדויק ומרכוז נכון אם משנים רוחב חלון/צ'אט בזמן פתיחה */
        window.addEventListener("resize", function () {
          if (!header.classList.contains("is-open")) return;
          compute();
          header.style.height = openH + "px";
          slot.style.width = big + "px";
          slot.style.height = big + "px";
          slot.style.transform = endTf;
          if (inner) inner.style.setProperty("--squareH", openH + "px");
        });
      })();
    </script>

    <!-- ===== לולאת קול — שלב (א): הקלטה → טקסט (STT). עוטף את המורה הקיים, לא משנה אותו ===== -->
    <script>
      (function () {
        var micBtn = document.getElementById("voiceMic");
        var statusEl = document.getElementById("voiceStatus");
        var header = document.getElementById("chatHeader");
        if (!micBtn || !statusEl) return;

        // ===== שיחה רציפה בקול: המיקרופון נפתח אוטומטית, ושקט אחרי דיבור שולח למורה =====
        var TARGET_RATE = 16000; // Azure STT — WAV PCM 16kHz מונו
        var fogLoader = document.getElementById("voiceFogLoader");
        var replyEl = document.getElementById("voiceReply");
        var slot = document.getElementById("mascotSlot");

        // זיהוי-דיבור (VAD) — מתי התלמיד סיים לדבר
        var SPEECH_RMS = 0.018;  // עוצמה שמעליה זה "דיבור"
        var SILENCE_MS = 1100;   // שקט אחרי דיבור → סוף תור → שולחים למורה
        var MIN_SPEECH_MS = 320; // חייב לפחות כך הרבה דיבור לפני שספירת השקט נספרת

        // state: "idle" | "listening" | "processing" | "speaking" | "paused"
        var state = "idle";
        var starting = false;  // ננעל בזמן פתיחת המיקרופון (מונע כפילות)
        var resumeTimer = null; // טיימר חזרה-אוטומטית להקשבה (ניתן לביטול בהשהיה/סגירה)
        var mic = null;        // { stream, ctx, source, node, rate } — נשאר פתוח לאורך השיחה
        var capturing = false; // שער VAD: true = צוברים אודיו ומזהים שקט
        var chunks = [];
        var sawSpeech, speechSamples, silenceSamples, finalized;

        function setStatus(t) { statusEl.textContent = t || ""; }
        function setRecordingUI(on) { micBtn.classList.toggle("is-recording", !!on); }
        function setBusyUI(on) { micBtn.classList.toggle("is-busy", !!on); }
        function setFogLoader(on) { if (fogLoader) fogLoader.hidden = !on; }
        // "מדבר": מפעיל את אנימציית הדיבור של הדמות (על הכותרת) + סימון על כפתור המיקרופון
        function setSpeaking(on) {
          micBtn.classList.toggle("is-speaking", !!on);
          if (header) header.classList.toggle("is-speaking", !!on);
        }

        /* תגובת המורה: עולה במרכז הערפל ונחשפת אות-אחר-אות (כמו בבועת הצ'אט), בלי סמן */
        var typeTimer = null;
        function clearReply() {
          if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
          if (replyEl) { replyEl.textContent = ""; replyEl.classList.remove("is-shown"); }
        }
        function showReply(text) {
          if (!replyEl) return;
          clearReply();
          void replyEl.offsetWidth; // reflow → אנימציית ה"עלייה" תרוץ מחדש
          replyEl.classList.add("is-shown");
          var spans = [], frag = document.createDocumentFragment();
          var arr = Array.from(String(text));
          for (var k = 0; k < arr.length; k++) {
            var s = document.createElement("span");
            s.className = "ch"; s.textContent = arr[k];
            frag.appendChild(s); spans.push(s);
          }
          replyEl.appendChild(frag);
          var i = 0;
          (function step() {
            if (i >= spans.length) { typeTimer = null; return; }
            spans[i].classList.add("ch--on"); i += 1;
            typeTimer = window.setTimeout(step, 18); // קצב הקלדה
          })();
        }
        // הודעה קצרה באזור הערפל (אותו מקום של הטעינה והתשובה) — בלי טייפרייטר
        function showFog(text) {
          if (!replyEl) return;
          clearReply();
          void replyEl.offsetWidth;
          replyEl.classList.add("is-shown");
          replyEl.textContent = text;
        }

        /* --- מיקרופון מתמשך דרך Web Audio (WAV PCM) — תואם ספארי+כרום --- */
        async function ensureMic() {
          if (mic) return;
          var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          var AC = window.AudioContext || window.webkitAudioContext;
          var ctx = new AC();
          if (ctx.state === "suspended") { try { await ctx.resume(); } catch (e) {} }
          // אם המערכת השהתה את ההקשר (נעילת מסך / החלפת טאב / שיחה נכנסת) — מחדשים כל עוד הריבוע פתוח
          ctx.onstatechange = function () {
            if (ctx.state === "suspended" && header.classList.contains("is-open")) {
              try { ctx.resume(); } catch (e) {}
            }
          };
          var source = ctx.createMediaStreamSource(stream);
          var node = ctx.createScriptProcessor(4096, 1, 1);
          var rate = ctx.sampleRate;
          node.onaudioprocess = function (e) {
            if (!capturing) return; // בזמן עיבוד/דיבור לא צוברים (אין הד מהמורה)
            var input = e.inputBuffer.getChannelData(0);
            chunks.push(new Float32Array(input)); // חובה להעתיק — ה-buffer ממוחזר
            var sum = 0;
            for (var i = 0; i < input.length; i++) sum += input[i] * input[i];
            var rms = Math.sqrt(sum / input.length);
            if (rms > SPEECH_RMS) { sawSpeech = true; speechSamples += input.length; silenceSamples = 0; }
            else if (sawSpeech) { silenceSamples += input.length; }
            if (!finalized && sawSpeech &&
                (speechSamples / rate) * 1000 > MIN_SPEECH_MS &&
                (silenceSamples / rate) * 1000 > SILENCE_MS) {
              finalized = true; capturing = false;
              Promise.resolve().then(finalizeTurn); // מחוץ ל-thread של האודיו
            }
          };
          source.connect(node);
          node.connect(ctx.destination); // פלט שקט — אין הד
          mic = { stream: stream, ctx: ctx, source: source, node: node, rate: rate };
        }
        function teardownMic() {
          capturing = false;
          if (!mic) return;
          var m = mic; mic = null;
          try { m.node.disconnect(); m.source.disconnect(); } catch (e) {}
          try { m.stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
          try { m.ctx.close(); } catch (e) {}
        }
        function resetVad() { chunks = []; sawSpeech = false; speechSamples = 0; silenceSamples = 0; finalized = false; }

        /* בונה WAV מהמקטע שנצבר — בלי לסגור את המיקרופון (נשאר פתוח לתור הבא) */
        function buildWav() {
          var len = 0;
          for (var i = 0; i < chunks.length; i++) len += chunks[i].length;
          var flat = new Float32Array(len), off = 0;
          for (var j = 0; j < chunks.length; j++) { flat.set(chunks[j], off); off += chunks[j].length; }
          return encodeWav(downsample(flat, mic ? mic.rate : TARGET_RATE, TARGET_RATE), TARGET_RATE);
        }

        /* הורדת קצב דגימה (ממוצע) — מספיק לדיבור */
        function downsample(buf, inRate, outRate) {
          if (outRate >= inRate) return buf;
          var ratio = inRate / outRate;
          var outLen = Math.floor(buf.length / ratio);
          var out = new Float32Array(outLen);
          for (var i = 0; i < outLen; i++) {
            var start = Math.floor(i * ratio), end = Math.floor((i + 1) * ratio), sum = 0, n = 0;
            for (var j = start; j < end && j < buf.length; j++) { sum += buf[j]; n++; }
            out[i] = n ? sum / n : 0;
          }
          return out;
        }

        /* קידוד WAV (PCM 16-bit LE, מונו) → Blob */
        function encodeWav(samples, rate) {
          var dataLen = samples.length * 2;
          var view = new DataView(new ArrayBuffer(44 + dataLen));
          function ws(o, s) { for (var i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); }
          ws(0, "RIFF"); view.setUint32(4, 36 + dataLen, true); ws(8, "WAVE");
          ws(12, "fmt "); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
          view.setUint16(22, 1, true); view.setUint32(24, rate, true);
          view.setUint32(28, rate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
          ws(36, "data"); view.setUint32(40, dataLen, true);
          var off = 44;
          for (var i = 0; i < samples.length; i++) {
            var s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
            off += 2;
          }
          return new Blob([view], { type: "audio/wav" });
        }

        /* שליחה ל-STT בשרת → טקסט עברי */
        async function transcribe(wavBlob) {
          var res = await fetch("/api/stt", {
            method: "POST",
            headers: { "content-type": "audio/wav; codecs=audio/pcm; samplerate=16000" },
            body: wavBlob,
          });
          var data = null;
          try { data = await res.json(); } catch (e) {}
          if (!res.ok || !data || !data.ok) throw new Error((data && data.message) || "HTTP " + res.status);
          return (data.text || "").trim();
        }

        /* --- הקראת תשובת המורה (TTS) ---
           ברירת מחדל: STREAMING דרך Web Audio (אודיו ראשון ב~שנייה). נפילה אוטומטית
           לנגן <audio> עם WAV מלא אם streaming כבוי בשרת (503) / נכשל / לא נתמך. */
        var ttsAudio = new Audio();
        ttsAudio.preload = "auto";
        var ttsUrl = null; // כתובת ה-Blob הנוכחית (לשחרור)
        var unlockUrl = null; // קליפ שקט קצר ל"פתיחת" הניגון

        // מצב streaming (Web Audio)
        var streamCtx = null; // AudioContext לניגון מקטעי PCM
        var streamSources = []; // BufferSourceNodes מתוזמנים (לעצירה)
        var streamStop = false; // בקשת עצירה ללולאת הקריאה
        var streamEndTimer = null; // טיימר סיום-ניגון (→ done)
        var streamEndResolve = null; // resolver של המתנת סיום-הניגון (כדי לשחרר מיד בעצירה)
        var speakGuard = null; // ה-watchdog הפעיל של speak() (כדי לבטל בעצירה — שלא יירה בתור הבא)
        var ttsStreamMode = "auto"; // "auto" | "on" | "off" (=503 בשרת → fallback קבוע)

        // "פותח" ניגון תחת מחוות-משתמש: גם נגן ה-<audio> וגם ה-AudioContext של ה-streaming
        function unlockAudio() {
          try {
            if (!unlockUrl) unlockUrl = URL.createObjectURL(encodeWav(new Float32Array(800), 16000));
            ttsAudio.src = unlockUrl;
            var p = ttsAudio.play();
            if (p && p.catch) p.catch(function () {});
          } catch (e) {}
          try {
            var AC = window.AudioContext || window.webkitAudioContext;
            if (AC && !streamCtx) streamCtx = new AC();
            if (streamCtx && streamCtx.state === "suspended") streamCtx.resume();
          } catch (e) {}
        }

        function stopSpeaking() {
          try { ttsAudio.pause(); ttsAudio.currentTime = 0; } catch (e) {}
          // עצירת streaming: לעצור את לולאת הקריאה ואת כל המקטעים המתוזמנים
          streamStop = true;
          if (streamEndTimer) { clearTimeout(streamEndTimer); streamEndTimer = null; }
          if (streamEndResolve) { var _rs = streamEndResolve; streamEndResolve = null; try { _rs(); } catch (e) {} }
          if (speakGuard) { clearTimeout(speakGuard); speakGuard = null; } // לבטל watchdog של תור שהופסק
          if (streamSources.length) {
            streamSources.forEach(function (s) { try { s.stop(); } catch (e) {} });
            streamSources = [];
          }
          setSpeaking(false);
        }

        /* ניגון STREAMING: מושך PCM מ-/api/tts-stream ומתזמן מקטעים על ציר-הזמן של
           AudioContext (gapless). מחזיר true אם ניגן (וקורא ל-done בסיום), אחרת false → fallback. */
        async function playTtsStream(text, reveal, done, logTts) {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (!AC || !window.fetch) return false;
          var res;
          try {
            res = await fetch("/api/tts-stream", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ text: text }) });
          } catch (e) { return false; }
          if (res.status === 503) { ttsStreamMode = "off"; return false; } // הוחזר בשרת → fallback קבוע
          if (!res.ok || !res.body || !res.body.getReader) return false;
          ttsStreamMode = "on";
          if (!streamCtx) streamCtx = new AC();
          var ctx = streamCtx;
          streamStop = false; streamSources = []; // לפני ה-await של resume — שבקשת-עצירה לא תאבד
          if (ctx.state === "suspended") { try { await ctx.resume(); } catch (e) {} }
          var rate = parseInt(res.headers.get("x-sample-rate") || "24000", 10) || 24000;
          var reader = res.body.getReader();
          var playHead = ctx.currentTime + 0.15; // לי-זמן קטן לפני המקטע הראשון
          var started = false;
          var leftover = new Uint8Array(0);
          for (;;) {
            var r;
            try { r = await reader.read(); } catch (e) { break; }
            if (streamStop) { try { reader.cancel(); } catch (e) {} break; }
            if (r.done) break;
            var chunk = r.value;
            if (!chunk || !chunk.length) continue;
            if (leftover.length) {
              var merged = new Uint8Array(leftover.length + chunk.length);
              merged.set(leftover, 0); merged.set(chunk, leftover.length);
              chunk = merged; leftover = new Uint8Array(0);
            }
            var n = chunk.length >> 1; // דגימות 16-bit
            var usable = n << 1;
            if (usable < chunk.length) leftover = chunk.slice(usable); // בייט אי-זוגי → להמשך
            if (n <= 0) continue;
            var f32 = new Float32Array(n);
            var dv = new DataView(chunk.buffer, chunk.byteOffset, usable);
            for (var i = 0; i < n; i++) f32[i] = dv.getInt16(i << 1, true) / 32768;
            var ab = ctx.createBuffer(1, n, rate);
            if (ab.copyToChannel) ab.copyToChannel(f32, 0); else ab.getChannelData(0).set(f32);
            var srcNode = ctx.createBufferSource();
            srcNode.buffer = ab; srcNode.connect(ctx.destination);
            var startAt = Math.max(playHead, ctx.currentTime + 0.03);
            try { srcNode.start(startAt); } catch (e) {}
            playHead = startAt + ab.duration;
            streamSources.push(srcNode);
            if (!started) { started = true; reveal(); setSpeaking(true); logTts("stream, אודיו ראשון"); }
          }
          if (!started) return false; // לא ניגן כלום → fallback
          if (streamStop) return true; // הופסק ידנית — לא לקרוא ל-done (המעצור מטפל במצב)
          // ממתינים שהניגון באמת יסתיים (ה-bytes נגמרו, אבל האודיו עוד מתנגן). שמירת ה-resolver → שחרור מיידי בעצירה
          var waitMs = Math.max(0, (playHead - ctx.currentTime) * 1000);
          await new Promise(function (rs) { streamEndResolve = rs; streamEndTimer = window.setTimeout(rs, waitMs + 80); });
          streamEndResolve = null; streamEndTimer = null;
          if (streamStop) return true; // הופסק תוך כדי ההמתנה — בלי done()
          setSpeaking(false);
          done();
          return true;
        }

        // מקבל טקסט → מנגן (streaming אם אפשר, אחרת WAV מלא). onDone נקרא בסיום (לחזרה להקשבה)
        async function speak(text, onDone) {
          var guard = null, shownText = false;
          function done() {
            if (guard) { clearTimeout(guard); guard = null; }
            speakGuard = null;
            if (onDone) { var f = onDone; onDone = null; f(); }
          }
          // חושף את הטקסט (פעם אחת) — מופעל כשהקול מתחיל, או כגיבוי אם הקול נכשל (שלא יאבד)
          function reveal() {
            if (shownText) return;
            shownText = true;
            setFogLoader(false);
            setBusyUI(false); // המורה מדבר → המיקרופון שוב לחיץ (אפשר להשתיק תוך כדי)
            showReply(text);
          }
          if (!text) { done(); return; }
          // שעון-בטיחות: גבוה מספיק שלא ייפול לפני שהניגון מסתיים (130ms/תו >> משך-האודיו לכל תו)
          guard = window.setTimeout(done, 12000 + String(text).length * 130);
          speakGuard = guard; // נרשם גלובלית כדי ש-stopSpeaking של תור-עתידי יבטל watchdog של תור שהופסק
          var tTts = (window.performance || Date).now();
          var ttsLogged = false;
          function logTts(stage) {
            if (ttsLogged) return; ttsLogged = true;
            console.log("[voice] ⏱ TTS(" + stage + ") " + Math.round((window.performance || Date).now() - tTts) + "ms  (" + String(text).length + " תווים)");
          }

          // 1) streaming (ברירת מחדל) — אודיו ראשון ב~שנייה
          if (ttsStreamMode !== "off") {
            try {
              var streamed = await playTtsStream(text, reveal, done, logTts);
              if (streamed) return;
            } catch (e) { console.warn("[voice] stream נכשל, נופל ל-WAV:", e && e.message); }
          }

          // 2) Fallback: WAV מלא דרך <audio>
          var res;
          try {
            res = await fetch("/api/tts", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ text: text }) });
          } catch (e) {
            console.warn("[voice] TTS fetch failed:", e && e.message);
            reveal();
            done();
            return;
          }
          if (!res.ok) {
            console.warn("[voice] TTS HTTP", res.status);
            setStatus("שגיאת קול מהשרת (" + res.status + ")");
            reveal();
            done();
            return;
          }
          var blob = await res.blob();
          logTts("WAV מלא");
          if (ttsUrl) { try { URL.revokeObjectURL(ttsUrl); } catch (e) {} }
          ttsUrl = URL.createObjectURL(blob);
          ttsAudio.src = ttsUrl;
          ttsAudio.onplaying = function () {
            reveal();
            setSpeaking(true);
          };
          ttsAudio.onended = function () { setSpeaking(false); done(); };
          ttsAudio.onerror = function () {
            setSpeaking(false);
            console.warn("[voice] <audio> error", ttsAudio.error && ttsAudio.error.code);
            reveal();
            done();
          };
          try {
            var pr = ttsAudio.play();
            if (pr && pr.catch) {
              pr.catch(function (err) {
                setSpeaking(false);
                console.warn("[voice] play blocked:", err && err.name, err && err.message);
                setStatus("הקול נחסם בדפדפן — הקישו רווח כדי לדבר");
                reveal();
                done();
              });
            }
          } catch (e) {
            setSpeaking(false);
            console.warn("[voice] play threw:", e && e.message);
            reveal();
            done();
          }
        }

        /* ===== מכונת-מצבים: הקשבה → עיבוד → דיבור → הקשבה (רציף) ===== */
        async function startListening() {
          if (state === "listening" || starting) return;
          if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
          starting = true;
          stopSpeaking();
          try {
            await ensureMic();
          } catch (e) {
            starting = false; state = "paused"; setRecordingUI(false);
            setStatus(e && (e.name === "NotAllowedError" || e.name === "SecurityError")
              ? "צריך לאשר גישה למיקרופון 🎤" : "אין מיקרופון זמין במכשיר הזה.");
            return;
          }
          // אם בזמן בקשת ההרשאה סגרו את הריבוע — לא להפעיל מיקרופון "תקוע": משחררים וחוזרים
          if (!header.classList.contains("is-open")) { starting = false; teardownMic(); return; }
          if (mic && mic.ctx.state === "suspended") { try { mic.ctx.resume(); } catch (e) {} }
          resetVad(); capturing = true; state = "listening"; starting = false;
          setBusyUI(false); setFogLoader(false); clearReply();
          setRecordingUI(true); setStatus(""); clearReply(); // בלי טקסט "מקשיב" — רק סמל המיקרופון הפועם
        }

        async function finalizeTurn() {
          if (state !== "listening") return; // הגנה מכפילות
          state = "processing"; capturing = false;
          setRecordingUI(false); setBusyUI(true); clearReply();
          setFogLoader(true); setStatus(""); // רק נקודות הטעינה באזור הערפל — בלי טקסט בפאנל
          var wav;
          try { wav = buildWav(); } catch (e) { return resumeAfter(); }
          resetVad(); // ניקוי למקטע הבא (המיקרופון נשאר פתוח)
          try {
            var tStt = (window.performance || Date).now();
            var text = await transcribe(wav);
            var sttMs = Math.round((window.performance || Date).now() - tStt);
            if (state !== "processing") return; // המשתמש סגר/השהה באמצע
            if (!text) { setFogLoader(false); showFog("לא שמעתי — נא דברו שוב"); return resumeAfter(); }
            var reply = "";
            var tAsk = (window.performance || Date).now();
            if (window.vela && typeof window.vela.askVoice === "function") reply = await window.vela.askVoice(text);
            var askMs = Math.round((window.performance || Date).now() - tAsk);
            if (state !== "processing") return; // נסגר באמצע
            if (reply) {
              // הטקסט יופיע רק כשהמורה מתחיל לדבר (בתוך speak, באירוע onplaying) — עד אז נשארות נקודות הטעינה
              state = "speaking";
              console.log("[voice] ⏱ STT(round-trip) " + sttMs + "ms | Claude(round-trip) " + askMs + "ms");
              speak(reply, function () { if (state === "speaking") startListening(); });
            } else {
              setFogLoader(false); showFog("המורה לא ענה — נסו שוב"); resumeAfter();
            }
          } catch (e) {
            if (state !== "processing") return; // הושהה/נסגר באמצע — לא לחדש אוטומטית
            setFogLoader(false); showFog("אופס, משהו השתבש. נסו שוב."); resumeAfter();
          }
        }

        // חזרה אוטומטית להקשבה אחרי כשל/אין-טקסט (אם השיחה פתוחה ולא הושהתה ידנית)
        function resumeAfter() {
          setBusyUI(false);
          state = "idle";
          if (resumeTimer) clearTimeout(resumeTimer);
          resumeTimer = window.setTimeout(function () {
            resumeTimer = null;
            if (state === "idle" && header.classList.contains("is-open")) startListening();
          }, 700);
        }

        function pauseListening() {
          if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
          state = "paused";
          teardownMic(); stopSpeaking();
          setRecordingUI(false); setBusyUI(false); setFogLoader(false);
          setStatus("");
          showFog("המיקרופון כבוי — לחצו כדי לדבר");
        }
        function resumeListening() { clearReply(); startListening(); }

        // מעבר דיבור→מיוט: שואלים "שמענו משהו?" — אם כן מעבדים מיד (נקודות טעינה+תשובה),
        // אם לא מציגים "נא דברו שוב". כך לחיצת מיוט אף פעם לא מאבדת את מה שנאמר.
        function finishOrPrompt() {
          var heardMs = mic ? (speechSamples / mic.rate) * 1000 : 0;
          if (sawSpeech && heardMs >= 200) {
            finalized = true; // מונע הפעלה כפולה של ה-VAD
            finalizeTurn(); // מציג את שלוש הנקודות, שולח לבינה, ומקריא את התשובה
          } else {
            // לא נשמע כלום → כיבוי + בקשה עדינה לדבר שוב, באזור הערפל (כמו הטעינה והתשובה)
            state = "paused";
            teardownMic(); stopSpeaking();
            setRecordingUI(false); setBusyUI(false); setFogLoader(false);
            setStatus("");
            showFog("לא שמעתי — נא דברו שוב");
          }
        }

        // רווח / לחיצה = החלפת מצב המיקרופון (כמו לחיצה על הכפתור):
        //  • בזמן הקשבה → "סיימתי לדבר": מעבדים אם נשמע משהו, אחרת "נא דברו שוב"
        //  • בזמן עיבוד/דיבור/חלון-חזרה → השהיה (כיבוי)
        //  • כבוי/idle → הדלקה והקשבה
        function toggleMic() {
          if (state === "listening") finishOrPrompt();
          else if (state === "processing" || state === "speaking" || resumeTimer) pauseListening();
          else resumeListening();
        }

        // לחיצה על המיקרופון — toggle
        micBtn.addEventListener("click", function () { unlockAudio(); toggleMic(); });
        // לחיצה על המורה — פותחת ניגון תחת מחווה (לפני שהריבוע מתחיל להקשיב)
        if (slot) slot.addEventListener("click", unlockAudio);

        // רווח: לחיצה אחת מלאה = toggle (לא push-to-talk). מתעלמים מחזרת-מקש והקלדה בשדה
        var spaceDown = false;
        function isTyping() {
          var el = document.activeElement;
          return !!el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable);
        }
        document.addEventListener("keydown", function (e) {
          if (e.code !== "Space" && e.key !== " ") return;
          if (!header.classList.contains("is-open") || isTyping()) return;
          e.preventDefault(); // לא לגלול את הדף
          if (e.repeat || spaceDown) return;
          spaceDown = true; unlockAudio(); toggleMic();
        });
        document.addEventListener("keyup", function (e) {
          if (e.code !== "Space" && e.key !== " ") return;
          spaceDown = false;
        });

        /* פתיחת/סגירת הריבוע: בפתיחה — מקשיבים אוטומטית; בסגירה — עוצרים ושופכים את כל השיחה לצ'אט */
        if (header && window.MutationObserver) {
          var wasOpen = false;
          new MutationObserver(function () {
            var open = header.classList.contains("is-open");
            if (open && !wasOpen) {
              clearReply(); setFogLoader(false);
              startListening(); // המיקרופון פתוח כברירת מחדל
            }
            if (!open && wasOpen) {
              if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
              teardownMic(); stopSpeaking();
              state = "idle"; setRecordingUI(false); setBusyUI(false); setFogLoader(false); clearReply();
              if (window.vela && typeof window.vela.flushVoice === "function") window.vela.flushVoice();
            }
            wasOpen = open;
          }).observe(header, { attributes: true, attributeFilter: ["class"] });
        }

        /* study-v2: כפתור המיקרופון בפס הכתיבה מפעיל/מכבה שיחה קולית —
           דרך פתיחת/סגירת ה-is-open הסמוי (המנגנון המלא של הקול נשאר זהה). */
        window.vela = window.vela || {};
        window.vela.voiceToggle = function () {
          unlockAudio(); // תחת מחוות-המשתמש (לחיצה) → ניגון לא ייחסם בספארי
          // פותח/סוגר את קופסת המורה המלאה — הריבוע המטושטש, המורה במרכז, והטקסט המדבר מתחתיו
          if (slot) slot.click();
          return header.classList.contains("is-open");
        };
        window.vela.voiceActive = function () { return header.classList.contains("is-open"); };
      })();
    </script>
  </body>
</html>
