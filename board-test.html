<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>לוח אזור הלמידה — דף בדיקה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --teal: #0d9488;
        --teal-soft: #d6f4ef;
        --orange: #f97316;
        --ink: #0f3b36;
        --muted: #5a6b68;
        --card: #ffffff;
        --line: rgba(13, 60, 53, 0.1);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Assistant", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(760px 540px at 90% -8%, rgba(249, 168, 96, 0.16), transparent 60%),
          radial-gradient(720px 560px at 4% 4%, rgba(20, 184, 166, 0.16), transparent 58%),
          #eef6f4;
        min-height: 100vh;
      }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 20px clamp(14px, 3vw, 32px) 64px; }

      header.top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
      .mark {
        width: 40px; height: 40px; border-radius: 13px;
        background: linear-gradient(140deg, #16c4b2, #0d9488);
        color: #fff; display: flex; align-items: center; justify-content: center;
        font-size: 20px; box-shadow: 0 8px 18px rgba(13, 148, 136, 0.3);
      }
      .title { font-family: "Fredoka", sans-serif; font-weight: 700; font-size: 19px; }
      .title small { display: block; font-family: "Assistant"; font-weight: 600; font-size: 13px; color: var(--muted); }
      .badge {
        margin-inline-start: auto; font-size: 12px; font-weight: 700; color: var(--teal);
        background: var(--teal-soft); padding: 6px 12px; border-radius: 999px;
      }

      .layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; align-items: start; }
      @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

      .card {
        background: var(--card); border-radius: 22px; padding: 18px;
        box-shadow: 0 10px 26px rgba(2, 6, 23, 0.06);
      }
      .card h2 { font-family: "Fredoka", sans-serif; font-size: 16px; margin: 0 0 12px; }

      /* הלוח */
      .boardCard { padding: 14px; }
      canvas#board {
        width: 100%; height: auto; display: block;
        border-radius: 16px; border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
        touch-action: none; /* מאפשר ציור במגע בלי גלילה */
      }
      .geoHint { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }

      /* פקדים */
      .seg { display: inline-flex; background: #eef2f1; border-radius: 999px; padding: 4px; gap: 4px; }
      .seg button {
        border: none; background: transparent; cursor: pointer; font-family: inherit;
        font-weight: 700; font-size: 14px; color: var(--muted); padding: 8px 16px; border-radius: 999px;
      }
      .seg button.on { background: #fff; color: var(--teal); box-shadow: 0 2px 6px rgba(2, 6, 23, 0.08); }

      .row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
      .row label { font-size: 13px; font-weight: 600; color: var(--muted); }
      input[type="number"], input[type="text"] {
        font-family: inherit; font-size: 14px; width: 64px; padding: 7px 9px;
        border: 1.5px solid var(--line); border-radius: 10px; background: #fbfdfc; color: var(--ink);
      }
      input[type="text"] { width: 110px; }
      .btn {
        font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
        border: none; border-radius: 11px; padding: 9px 15px;
        background: var(--teal); color: #fff; box-shadow: 0 6px 14px rgba(13, 148, 136, 0.28);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .btn:hover { transform: translateY(-1px); }
      .btn.ghost { background: #fff; color: var(--teal); border: 1.5px solid rgba(13, 148, 136, 0.3); box-shadow: none; }
      .btn.warm { background: var(--orange); box-shadow: 0 6px 14px rgba(249, 115, 22, 0.28); }
      .btn.gray { background: #eef2f1; color: var(--muted); box-shadow: none; }

      .toolBlock { padding: 12px; border: 1px dashed var(--line); border-radius: 14px; margin-bottom: 12px; }
      .toolBlock h3 { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: var(--teal); font-family: "Fredoka", sans-serif; }

      .presets { display: flex; flex-wrap: wrap; gap: 8px; }

      .dataPanel pre {
        background: #0f3b36; color: #d6f4ef; border-radius: 12px; padding: 12px;
        font-size: 12px; line-height: 1.5; max-height: 240px; overflow: auto; margin: 0;
        direction: ltr; text-align: left;
      }
      .countPill { font-weight: 700; color: var(--orange); }
      .mt { margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <a href="/learn" class="mark" style="text-decoration: none" title="חזרה לאזור הלמידה">→</a>
        <div class="title" id="boardTitle">לוח אזור הלמידה<small id="boardSub">דף בדיקה ידני — לפני חיבור Claude</small></div>
        <span class="badge">שלב ב</span>
      </header>

      <div class="layout">
        <!-- הלוח -->
        <section class="card boardCard">
          <div class="row" style="justify-content: space-between; margin-bottom: 12px">
            <div class="seg" id="bgSeg">
              <button data-bg="grid" class="on">משבצות</button>
              <button data-bg="dots">נקודות</button>
            </div>
            <div class="seg" id="modeSeg">
              <button data-mode="idle" class="on">צפייה</button>
              <button data-mode="child">✏️ ציור ילד</button>
            </div>
          </div>
          <canvas id="board"></canvas>
          <div class="geoHint">מרחב לוגי 800×560 · משבצת 40 · ראשית (0,0) שמאל-עליון</div>
        </section>

        <!-- פקדים -->
        <aside>
          <section class="card">
            <h2>🎨 כלי המורה (Tool Use)</h2>

            <div class="toolBlock">
              <h3>draw_circle</h3>
              <div class="row">
                <label>x</label><input type="number" id="c_x" value="200" />
                <label>y</label><input type="number" id="c_y" value="200" />
                <label>r</label><input type="number" id="c_r" value="60" />
                <button class="btn" id="btnCircle">צייר עיגול</button>
              </div>
            </div>

            <div class="toolBlock">
              <h3>draw_line</h3>
              <div class="row">
                <label>x1</label><input type="number" id="l_x1" value="120" />
                <label>y1</label><input type="number" id="l_y1" value="360" />
                <label>x2</label><input type="number" id="l_x2" value="680" />
                <label>y2</label><input type="number" id="l_y2" value="360" />
                <button class="btn" id="btnLine">צייר קו</button>
              </div>
            </div>

            <div class="toolBlock">
              <h3>write_text</h3>
              <div class="row">
                <label>x</label><input type="number" id="t_x" value="400" />
                <label>y</label><input type="number" id="t_y" value="120" />
                <label>טקסט</label><input type="text" id="t_text" value="3 + 4 = 7" />
                <button class="btn" id="btnText">כתוב</button>
              </div>
            </div>

            <div class="row" style="gap: 10px">
              <button class="btn gray" id="btnClear">clear_board — נקה לוח</button>
            </div>

            <div class="mt">
              <h3 style="font-size: 13px; color: var(--muted); margin: 0 0 8px">דוגמאות מהירות</h3>
              <div class="presets">
                <button class="btn ghost" id="presetNumberLine">ציר מספרים 0–10</button>
                <button class="btn ghost" id="presetApples">5 עיגולים לספירה</button>
              </div>
            </div>
          </section>

          <section class="card mt dataPanel">
            <h2>👦 ציור הילד — קואורדינטות שמורות</h2>
            <div class="row" style="justify-content: space-between">
              <span>סך הקווים: <span class="countPill" id="strokeCount">0</span></span>
              <div style="display: flex; gap: 8px">
                <button class="btn gray" id="btnToggleData">scene מלא</button>
                <button class="btn warm" id="btnClearChild">נקה ציורי ילד</button>
              </div>
            </div>
            <pre id="dataOut">[]</pre>
          </section>
        </aside>
      </div>
    </div>

    <script src="./board.js"></script>
    <script>
      var canvas = document.getElementById("board");
      var board = new VelaBoard(canvas, { background: "grid", mode: "idle" });

      // אם הגענו מנושא באזור הלמידה (?topic=...) — מציגים אותו בכותרת.
      (function showTopic() {
        var topic = new URLSearchParams(location.search).get("topic");
        if (!topic) return;
        document.getElementById("boardTitle").childNodes[0].nodeValue = "לומדים: " + topic + " ";
        document.getElementById("boardSub").textContent = "דף בדיקה — חיבור Claude בשלב הבא";
        document.title = topic + " — לוח אזור הלמידה";
      })();

      function num(id) {
        var v = parseFloat(document.getElementById(id).value);
        return isFinite(v) ? v : 0;
      }

      // ---- מתג רקע ----
      document.getElementById("bgSeg").addEventListener("click", function (e) {
        var b = e.target.closest("button");
        if (!b) return;
        board.setBackground(b.dataset.bg);
        segSet("bgSeg", b);
      });
      // ---- מתג מצב (צפייה / ציור ילד) ----
      document.getElementById("modeSeg").addEventListener("click", function (e) {
        var b = e.target.closest("button");
        if (!b) return;
        board.setMode(b.dataset.mode);
        segSet("modeSeg", b);
      });
      function segSet(segId, btn) {
        var seg = document.getElementById(segId);
        seg.querySelectorAll("button").forEach(function (x) { x.classList.remove("on"); });
        btn.classList.add("on");
      }

      // ---- כלי המורה (דרך נקודת הכניסה האחת: board.tool) ----
      document.getElementById("btnCircle").onclick = function () {
        board.tool("draw_circle", { x: num("c_x"), y: num("c_y"), r: num("c_r") });
      };
      document.getElementById("btnLine").onclick = function () {
        board.tool("draw_line", { x1: num("l_x1"), y1: num("l_y1"), x2: num("l_x2"), y2: num("l_y2") });
      };
      document.getElementById("btnText").onclick = function () {
        board.tool("write_text", { x: num("t_x"), y: num("t_y"), text: document.getElementById("t_text").value });
      };
      document.getElementById("btnClear").onclick = function () {
        board.tool("clear_board", {});
        refreshData();
      };

      // ---- דוגמאות מהירות ----
      document.getElementById("presetNumberLine").onclick = function () {
        board.tool("clear_board", {});
        board.tool("draw_line", { x1: 100, y1: 300, x2: 700, y2: 300 });
        for (var n = 0; n <= 10; n++) {
          var x = 100 + (n * 600) / 10;
          board.tool("draw_line", { x1: x, y1: 290, x2: x, y2: 310 });
          board.tool("write_text", { x: x, y: 340, text: String(n), size: 22 });
        }
        refreshData();
      };
      document.getElementById("presetApples").onclick = function () {
        board.tool("clear_board", {});
        board.tool("write_text", { x: 400, y: 90, text: "כמה עיגולים?", size: 30 });
        for (var i = 0; i < 5; i++) {
          board.tool("draw_circle", { x: 180 + i * 110, y: 280, r: 40, color: "#f6b73c" });
        }
        refreshData();
      };

      // ---- פאנל נתוני הילד ----
      var showFullScene = false;
      board.onChildStroke(function () { refreshData(); });
      function refreshData() {
        var strokes = board.getChildStrokes();
        document.getElementById("strokeCount").textContent = strokes.length;
        var out = showFullScene ? board.getScene() : strokes;
        document.getElementById("dataOut").textContent = JSON.stringify(out, null, 2);
      }
      document.getElementById("btnToggleData").onclick = function () {
        showFullScene = !showFullScene;
        this.textContent = showFullScene ? "רק ילד" : "scene מלא";
        refreshData();
      };
      document.getElementById("btnClearChild").onclick = function () {
        board.clearChildStrokes();
        refreshData();
      };

      refreshData();
    </script>
  </body>
</html>
