<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>אזור הלמידה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --teal: #0d9488; --ink: #0f3b36; --muted: #51706c; --z-dial: 30; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; overflow: hidden; overscroll-behavior: none; }
      body { font-family: "Assistant", sans-serif; background: #fff; }

      /* הלוח ממלא את כל המסך — דף ענק אחד של משבצות */
      #boardWrap { position: fixed; inset: 0; }
      canvas#board { width: 100%; height: 100%; display: block; touch-action: none; }

      /* צל רך סביב כל קצוות המסך — כאילו הקצוות מצלים פנימה, ומתחזק מעט למטה
         כך שמרגיש שהצל ממשיך מתחת למסך. מעל הלוח, מתחת לפקדים. */
      .edgeShadow {
        position: fixed; inset: 0; pointer-events: none; z-index: 4;
        box-shadow:
          inset 0 0 100px 8px rgba(13, 60, 53, 0.12),
          inset 0 -85px 95px -42px rgba(13, 60, 53, 0.17);
      }

      /* קישוט עליון מינימלי — שלא יסיח מהמשבצות */
      .topbar {
        position: fixed; top: 0; inset-inline: 0; height: 56px;
        display: flex; align-items: center; gap: 12px;
        padding: 0 16px; pointer-events: none; z-index: 5;
      }
      .chip {
        pointer-events: auto;
        display: inline-flex; align-items: center; gap: 8px;
        height: 38px; padding: 0 14px; border-radius: 999px;
        background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(6px);
        border: 1px solid rgba(13, 60, 53, 0.08);
        box-shadow: 0 4px 14px rgba(2, 6, 23, 0.06);
        font-weight: 700; color: var(--ink); text-decoration: none; font-size: 15px;
      }
      .chip.back { font-size: 18px; padding: 0 12px; }
      .chip.topic { color: var(--teal); }
      .chip.topic .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); }
      .spacer { flex: 1; }

      /* כפתורי זום צפים */
      .zoomCtl {
        position: fixed; bottom: 18px; inset-inline-start: 18px; z-index: 5;
        display: flex; flex-direction: column; gap: 8px;
      }
      .zoomCtl button {
        width: 44px; height: 44px; border-radius: 16px; cursor: pointer;
        border: 1px solid rgba(13, 60, 53, 0.08);
        background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(6px);
        box-shadow: 0 4px 14px rgba(2, 6, 23, 0.08);
        font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.12s ease;
      }
      .zoomCtl button:hover { transform: translateY(-1px); }
      .zoomCtl button:active { transform: scale(0.94); }
      .zoomCtl .reset { font-size: 18px; }

      /* בורר רקע הלוח (משבצות / נקודות / חלק) — עיגול עם הרקע הנוכחי; בריחוף נפתחות שתי האחרות */
      .bgPicker { position: fixed; top: 9px; inset-inline-end: 16px; z-index: 6; width: 38px; height: 38px; } /* קוטר = גובה הצ'יפים (38px), מיושר לכפתור היציאה/הנושא */
      .bgOpt {
        position: absolute; top: 0; inset-inline-end: 0; width: 38px; height: 38px; padding: 0; overflow: hidden;
        border: 1px solid rgba(13, 60, 53, 0.10); border-radius: 50%; cursor: pointer;
        background: #fff;
        box-shadow: 0 5px 16px rgba(2, 6, 23, 0.10);
        transform: translateY(0) scale(0.4); opacity: 0; pointer-events: none; z-index: 1;
        transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.24s ease, box-shadow 0.18s ease;
      }
      .bgOpt svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; } /* התבנית ממלאת את כל העיגול (נחתכת לעיגול ע"י overflow) */
      .bgOpt.is-current { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; z-index: 3; }
      .bgPicker.is-open .bgOpt {
        opacity: 1; pointer-events: auto; transform: translateY(calc(var(--i, 0) * 44px)) scale(1);
        transition-delay: calc(var(--i, 0) * 0.045s);
      }
      .bgOpt:hover { box-shadow: 0 7px 20px rgba(2, 6, 23, 0.16); }
      @media (prefers-reduced-motion: reduce) { .bgOpt { transition: opacity 0.12s linear; } }

      /* ───────── חוגת הכלים ───────── */
      /* אלמנט אחד שמתמרח: עיגול → גלולה. הכלי הפעיל גולש ממרכז העיגול למקומו. */
      .toolDial {
        position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
        z-index: var(--z-dial);
      }

      .dial {
        height: 46px; width: 46px; border-radius: 999px; overflow: hidden;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        background: rgba(255, 255, 255, 0.62); /* האליפסה הלבנה — בלי מסגרת, רק צל קל מתחת */
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        backdrop-filter: blur(20px) saturate(150%);
        box-shadow: 0 7px 18px rgba(13, 60, 53, 0.07); /* הצללה ממש עדינה מתחת — בעיגול וכשמתרחב */
        transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.26s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .toolDial.open .dial { width: var(--openW, 360px); cursor: default; }
      /* כשבוחרים אובייקט — החוגה נסגרת בעדינות (במקום להיעלם), וחוזרת חלק כעיגול הסמן */
      .toolDial.is-hidden { pointer-events: none; }
      .toolDial.is-hidden .dial { opacity: 0; transform: scale(0.6); pointer-events: none; }

      /* שורת האייקונים — ברוחב מלא תמיד; בעיגול הסגור היא מוסטת כך שהכלי הפעיל במרכז, ונגזרת */
      .dial__row {
        flex: none; position: relative;
        display: flex; align-items: center; gap: 18px; padding: 0 18px;
        transform: translateX(var(--shift, 0px));
        transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .toolDial.open .dial__row { transform: translateX(0); }

      /* אייקוני הכלים — חופשיים, בלי מסגרת, במרווחים שווים */
      .dial__tool {
        position: relative; width: 34px; height: 34px; padding: 0; border: none; background: none;
        display: flex; align-items: center; justify-content: center; flex: none;
        color: var(--muted); cursor: pointer;
        opacity: 0; transition: opacity 0.18s ease, color 0.15s ease, transform 0.34s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .dial__tool.active { color: var(--teal); opacity: 1; } /* הכלי הפעיל תמיד גלוי — גם בעיגול הסגור */
      .toolDial.open .dial__tool { opacity: 1; }

      /* בורר הצורות: כשפעיל — כלי החוגה עפים החוצה לצדדים, והצורות נפרשות מהמרכז */
      .dial__shapes {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 30px;
        opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.2s ease, visibility 0.2s;
      }
      .toolDial.is-shapes .dial__shapes { opacity: 1; visibility: visible; pointer-events: auto; }
      .toolDial.is-shapes .dial__tool { opacity: 0 !important; pointer-events: none; }
      .toolDial.is-shapes .dial__tool:nth-child(-n+3) { transform: translateX(78px); }
      .toolDial.is-shapes .dial__tool:nth-child(4) { transform: scale(0.4); }
      .toolDial.is-shapes .dial__tool:nth-child(n+5) { transform: translateX(-78px); }
      .dial__shape {
        width: 38px; height: 38px; padding: 0; border: none; background: none; flex: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center; color: var(--muted);
        transform: scale(0.2); opacity: 0;
        transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease, color 0.15s ease;
      }
      .toolDial.is-shapes .dial__shape { transform: scale(1); opacity: 1; }
      .toolDial.is-shapes .dial__shape:nth-child(1) { transition-delay: 0.04s; }
      .toolDial.is-shapes .dial__shape:nth-child(2) { transition-delay: 0.09s; }
      .toolDial.is-shapes .dial__shape:nth-child(3) { transition-delay: 0.14s; }
      .dial__shape:hover { color: var(--ink); }
      .dial__shape svg { width: 27px; height: 27px; display: block; }
      /* כפתור חזרה (שברון שמאלה, בלי קו ראשי) — יוצא מבורר הצורות חזרה לכלים */
      .dial__back {
        position: absolute; left: 12px; top: 50%; width: 30px; height: 30px; padding: 0; flex: none;
        border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        color: var(--muted); opacity: 0; transform: translateY(-50%) translateX(-6px);
        transition: opacity 0.2s ease 0.05s, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1) 0.05s, color 0.15s ease;
      }
      .toolDial.is-shapes .dial__back { opacity: 1; transform: translateY(-50%) translateX(0); }
      .dial__back:hover { color: var(--ink); }
      .dial__back svg { width: 22px; height: 22px; display: block; }
      .toolDial.open .dial__tool:nth-child(1) { transition-delay: 0.03s; }
      .toolDial.open .dial__tool:nth-child(2) { transition-delay: 0.05s; }
      .toolDial.open .dial__tool:nth-child(3) { transition-delay: 0.07s; }
      .toolDial.open .dial__tool:nth-child(4) { transition-delay: 0.09s; }
      .toolDial.open .dial__tool:nth-child(5) { transition-delay: 0.11s; }
      .toolDial.open .dial__tool:nth-child(6) { transition-delay: 0.13s; }
      .toolDial.open .dial__tool:nth-child(7) { transition-delay: 0.15s; }
      .dial__tool svg { width: 25px; height: 25px; display: block; }
      .dial__tool:hover { color: var(--ink); }
      .dial__tool:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; border-radius: 10px; }

      @media (prefers-reduced-motion: reduce) {
        .dial { transition: width 0.12s linear; }
        .dial__row { transition: none; }
        .dial__tool { transition: opacity 0.12s linear, color 0.12s linear; }
      }

      /* ───────── תפריט מאפיינים (נפתח כשבוחרים אובייקט, במקום החוגה) ───────── */
      /* מורפינג מהעיגול — בדיוק כמו חוגת הכלים (נפתח ונסגר מהמקום, לא יורד למטה) */
      .propsBar {
        position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: var(--z-dial);
        direction: ltr; height: 46px; width: 46px; border-radius: 999px; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255, 255, 255, 0.62);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        backdrop-filter: blur(20px) saturate(150%);
        box-shadow: 0 7px 18px rgba(13, 60, 53, 0.1);
        opacity: 0; visibility: hidden; pointer-events: none;
        /* סגירה (חזרה לעיגול) — איטית וחלקה יותר; השקיפות נמוגה לאורך כל הכיווץ */
        transition: width 0.62s cubic-bezier(0.33, 1, 0.68, 1), opacity 0.55s ease, visibility 0s linear 0.62s;
      }
      /* פתיחה — מהירה וזריזה (לא משתנה) */
      .propsBar.is-show {
        width: var(--propsW, 360px); opacity: 1; visibility: visible; pointer-events: auto;
        transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.26s ease, visibility 0s linear 0s;
      }
      .propsBar__row { position: relative; flex: none; display: flex; align-items: center; gap: 9px; padding: 0 12px; }
      .propsBar__grp { display: flex; align-items: center; gap: 9px; transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.22s ease; }
      .propsBar__btn {
        border: none; background: none; cursor: pointer; width: 34px; height: 34px; padding: 0;
        display: flex; align-items: center; justify-content: center; color: var(--muted); border-radius: 14px;
        transition: color 0.15s ease, background 0.15s ease;
      }
      .propsBar__btn svg { width: 22px; height: 22px; display: block; }
      .propsBar__btn:hover { color: var(--ink); background: rgba(13, 60, 53, 0.05); }
      .propsBar__btn.active { color: var(--teal); }
      .propsBar__trash { color: #ef4444; }
      .propsBar__trash:hover { color: #ef4444; background: rgba(239, 68, 68, 0.12); }
      .propsBar__sep { width: 1px; height: 22px; background: rgba(13, 60, 53, 0.12); }
      /* עיגול הצבע הנוכחי — מחליף את שלל הגוונים */
      .propsBar__color {
        width: 26px; height: 26px; border-radius: 50%; padding: 0; flex: none; cursor: pointer;
        border: 2px solid #fff; background: var(--teal);
        box-shadow: 0 1px 4px rgba(2, 6, 23, 0.18), 0 0 0 1px rgba(13, 60, 53, 0.12);
        transition: transform 0.16s ease, opacity 0.22s ease;
      }
      .propsBar__color:hover { transform: scale(1.12); }

      /* מצב בחירת-צבע: הפקדים הקיימים עפים הצידה ופס הקשת מתגלה */
      .propsBar.is-picking .propsBar__grp--start { transform: translateX(86px); opacity: 0; pointer-events: none; }
      .propsBar.is-picking .propsBar__grp--end { transform: translateX(-86px); opacity: 0; pointer-events: none; }
      .propsBar.is-picking .propsBar__color { opacity: 0; pointer-events: none; }
      .propsBar__back {
        position: absolute; left: 10px; top: 50%; width: 30px; height: 30px; padding: 0;
        border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        color: var(--muted); opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-50%) translateX(-6px);
        transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.22s, color 0.15s ease;
      }
      .propsBar.is-picking .propsBar__back { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(-50%) translateX(0); }
      .propsBar__back:hover { color: var(--ink); }
      .propsBar__back svg { width: 22px; height: 22px; display: block; }
      .propsBar__rainbow {
        position: absolute; top: 50%; left: 18px; right: 18px; transform: translateY(-50%);
        height: 22px; display: flex; align-items: center;
        opacity: 0; visibility: hidden; pointer-events: none;
        transition: opacity 0.24s ease, visibility 0.24s, left 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .propsBar.is-picking .propsBar__rainbow { opacity: 1; visibility: visible; pointer-events: auto; left: 44px; right: 14px; }
      .propsBar__rainbowTrack {
        position: relative; width: 100%; height: 12px; border-radius: 999px; cursor: pointer;
        background: linear-gradient(to right, hsl(0,90%,55%), hsl(45,92%,53%), hsl(90,80%,48%), hsl(140,75%,45%), hsl(180,80%,46%), hsl(220,88%,57%), hsl(265,85%,60%), hsl(310,85%,58%), hsl(360,90%,55%));
        box-shadow: inset 0 0 0 1px rgba(13, 60, 53, 0.10);
      }
      .propsBar__rainbowDot {
        position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border-radius: 50%; padding: 0;
        transform: translate(-50%, -50%); border: 3px solid #fff; background: var(--teal); cursor: grab; touch-action: none;
        box-shadow: 0 1px 5px rgba(2, 6, 23, 0.3);
      }
      .propsBar__rainbowDot:active { cursor: grabbing; }
      .propsBar__thick { display: flex; gap: 3px; }
      .propsBar__thick .propsBar__btn { width: 30px; }

      /* ───────── חלונית "מה ציירתי?" (בקשה מהמורה להבין) ───────── */
      .askChip {
        position: fixed; top: 68px; left: 50%; z-index: 35;
        display: flex; align-items: center; gap: 10px;
        background: rgba(255, 255, 255, 0.92);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        border: 1px solid rgba(13, 60, 53, 0.08);
        border-radius: 999px; padding: 7px 7px 7px 16px;
        box-shadow: 0 12px 28px rgba(13, 60, 53, 0.16);
        opacity: 0; visibility: hidden; pointer-events: none;
        transform: translateX(-50%) translateY(-10px);
        transition: opacity 0.25s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.25s;
      }
      /* החלונית עצמה לא לוכדת אירועים (שלא תחסום ציור מתחתיה) — רק כפתור ה-✓ */
      .askChip.is-show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
      .askChip.is-show .askChip__ok { pointer-events: auto; }
      .askChip__txt { font-weight: 600; font-size: 14px; color: var(--ink); }
      .askChip__ok {
        width: 36px; height: 36px; flex: none; border: none; border-radius: 50%;
        background: var(--teal); color: #fff; font-size: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.12s ease, background 0.15s ease;
      }
      .askChip__ok:hover { background: #0b8378; transform: scale(1.06); }
      @media (prefers-reduced-motion: reduce) { .askChip { transition: opacity 0.12s linear, visibility 0.12s; transform: translateX(-50%) !important; } }

      /* ───────── כפתור המורה (מרחף) + צ'אט ───────── */
      .teacherFab {
        position: fixed; left: 20px; bottom: 16px; z-index: 20;
        width: 78px; height: 92px; padding: 0; border: none; background: none; cursor: pointer;
      }
      .teacherFab__art {
        display: block; width: 72px; height: 72px; margin: 0 auto;
        animation: fabBob 4.6s ease-in-out infinite;
      }
      .teacherFab__art svg { display: block; width: 100%; height: 100%; transition: transform 0.2s ease; }
      .teacherFab:hover .teacherFab__art svg { transform: scale(1.06); }
      .teacherFab__shadow {
        position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
        width: 50px; height: 11px; border-radius: 50%;
        background: rgba(13, 60, 53, 0.2); filter: blur(2px);
        animation: fabShadow 4.6s ease-in-out infinite;
      }
      @keyframes fabBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
      @keyframes fabShadow {
        0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.5; }
        50% { transform: translateX(-50%) scaleX(0.78); opacity: 0.3; }
      }

      .chatPanel {
        position: fixed; left: 18px; bottom: 116px; z-index: 40;
        width: min(360px, calc(100vw - 36px));
        height: min(520px, calc(100dvh - 170px));
        display: flex; flex-direction: column; overflow: hidden;
        background: #fff; border-radius: 26px;
        box-shadow: 0 24px 60px rgba(13, 60, 53, 0.22);
        opacity: 0; visibility: hidden; pointer-events: none;
        transform: translateY(14px) scale(0.96); transform-origin: left bottom;
        transition: opacity 0.26s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.26s;
      }
      .chatPanel.is-open { opacity: 1; visibility: visible; pointer-events: auto; transform: none; }
      .chatPanel__head {
        display: flex; align-items: center; gap: 10px; padding: 12px 14px;
        background: linear-gradient(135deg, #e9faf6, #ffffff);
        border-bottom: 1px solid rgba(13, 60, 53, 0.06);
      }
      .chatPanel__avatar { width: 40px; height: 40px; flex: none; }
      .chatPanel__title { font-family: "Fredoka", sans-serif; font-weight: 700; font-size: 16px; color: var(--ink); line-height: 1.15; }
      .chatPanel__title small { display: block; font-family: "Assistant", sans-serif; font-weight: 600; font-size: 12px; color: var(--muted); }
      .chatPanel__close {
        margin-inline-start: auto; width: 30px; height: 30px; border: none; border-radius: 50%;
        background: rgba(13, 60, 53, 0.06); color: var(--muted); font-size: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .chatPanel__close:hover { background: rgba(13, 60, 53, 0.12); }
      .chatPanel__msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; background: #f7fbfa; }
      .msg { max-width: 82%; padding: 9px 13px; border-radius: 20px; font-size: 15px; line-height: 1.45; word-wrap: break-word; }
      .msg.bot { align-self: flex-start; background: #fff; color: var(--ink); border-bottom-right-radius: 6px; box-shadow: 0 2px 8px rgba(2, 6, 23, 0.05); }
      .msg.me { align-self: flex-end; background: var(--teal); color: #fff; border-bottom-left-radius: 6px; }
      .msg.typing { display: flex; gap: 4px; align-items: center; }
      .msg.typing span { width: 7px; height: 7px; border-radius: 50%; background: #9bb3ae; animation: chatDot 1s infinite; }
      .msg.typing span:nth-child(2) { animation-delay: 0.15s; }
      .msg.typing span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes chatDot { 0%, 60%, 100% { opacity: 0.35; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
      .chatPanel__input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(13, 60, 53, 0.06); background: #fff; }
      .chatPanel__input input {
        flex: 1; min-width: 0; border: 1.5px solid rgba(13, 60, 53, 0.12); border-radius: 999px;
        padding: 10px 16px; font-family: inherit; font-size: 15px; color: var(--ink); background: #fbfdfc;
      }
      .chatPanel__input input:focus { outline: none; border-color: var(--teal); }
      .chatPanel__input button {
        width: 42px; height: 42px; flex: none; border: none; border-radius: 50%;
        background: var(--teal); color: #fff; font-size: 17px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .chatPanel__input button:hover { background: #0b8378; }

      /* בועת דיבור של המורה (תשובת ה-✓) — מימין לדמות, צל רך משלה (בלי החשכת מסך) */
      .teacherBubble {
        position: fixed; left: 92px; bottom: 90px; z-index: 38;
        max-width: min(320px, calc(100vw - 112px));
        background: #fff; color: var(--ink);
        /* פינה שמאלית-תחתונה ישרה (חדה) — הבועה מצביעה באלכסון אל המורה, בלי חץ */
        border-radius: 24px 24px 24px 0; padding: 13px 17px;
        font-size: 15.5px; line-height: 1.55; font-weight: 500;
        box-shadow: 0 12px 34px rgba(13, 60, 53, 0.2);
        opacity: 0; visibility: hidden; pointer-events: none;
        transform: translate(-6px, 6px) scale(0.96); transform-origin: left bottom;
        transition: opacity 0.26s ease, transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.26s;
      }
      .teacherBubble.is-show { opacity: 1; visibility: visible; pointer-events: auto; transform: none; }
      .bubbleTyping { display: inline-flex; gap: 5px; align-items: center; padding: 3px 0; }
      .bubbleTyping span { width: 8px; height: 8px; border-radius: 50%; background: #9bb3ae; animation: chatDot 1s infinite; }
      .bubbleTyping span:nth-child(2) { animation-delay: 0.15s; }
      .bubbleTyping span:nth-child(3) { animation-delay: 0.3s; }

      /* תיבות-תשובה (input שקוף מעל המסגרת שמצוירת על הלוח) — יכולות להיות כמה */
      .answerInput {
        position: fixed; z-index: 39; display: none; box-sizing: border-box;
        border: none; outline: none; background: transparent;
        font-family: "Fredoka", "Assistant", sans-serif; font-weight: 700;
        color: var(--ink); padding: 0 10px;
      }
      .answerInput.is-show { display: block; }

      /* עורך טקסט inline (כלי הטקסט) — קו מקווקו שכותבים בתוכו, גדל עם הטקסט */
      #textEditor {
        position: fixed; z-index: 40; display: none;
        border: 2px dashed var(--teal); border-radius: 8px;
        background: rgba(255, 255, 255, 0.82); padding: 1px 8px;
        font-family: "Fredoka", "Assistant", sans-serif; font-weight: 700;
        color: #1a1a1a; outline: none; white-space: pre; min-width: 26px; line-height: 1.25;
      }

      @media (prefers-reduced-motion: reduce) {
        .teacherFab__art, .teacherFab__shadow { animation: none; }
        .chatPanel { transition: opacity 0.15s linear, visibility 0.15s; transform: none; }
        .propsBar { transition: width 0.12s linear, opacity 0.12s linear, visibility 0.12s; }
        .toolDial.is-hidden .dial { transition: opacity 0.12s linear; transform: none; }
        .teacherBubble { transition: opacity 0.12s linear, visibility 0.12s; transform: none; }
      }
    </style>

    <script src="./board.js"></script>
    <script>
      // הלוח: מסך מלא, רשת משבצות מרובעות (מצב fill), עם גרירה+זום
      var canvas = document.getElementById("board");
      var board = new VelaBoard(canvas, {
        fit: "fill", background: "grid", grid: 42, mode: "idle",
        pan: true, zoom: true, // זום: גלגלת / צביטה / כפתורים. הזזה: יד שתופסת / החלקה אופקית.
      });
      window.velaBoard = board; // נגיש לקונסול — לבדיקת כלי מורה, למשל:
      // velaBoard.tool('draw_circle', { x: 300, y: 240, r: 60 })

      document.getElementById("zoomIn").onclick = function () { board.zoomIn(); };
      document.getElementById("zoomOut").onclick = function () { board.zoomOut(); };
      document.getElementById("zoomReset").onclick = function () { board.organizeView(); }; // בית = סדר תצוגה כך שכל התוכן/השאלות נראים

      // ───────── זיכרון לוח לפי נושא (מיקום + קישקושים + רקע) ─────────
      (function boardMemory() {
        var topic = new URLSearchParams(location.search).get("topic") || "";
        var committedBg = board.background || "grid"; // הרקע שנבחר בפועל (לא תצוגה-מקדימה זמנית)
        var saveT = null;
        function key() { return "vela_board_" + topic; }
        function save() {
          if (!topic) return;
          try {
            localStorage.setItem(key(), JSON.stringify({ v: 1, view: board.getView(), bg: committedBg, strokes: board.getChildStrokes() }));
          } catch (e) { /* מכסת אחסון / פרטיות — לא קריטי */ }
        }
        function saveSoon() { if (saveT) clearTimeout(saveT); saveT = setTimeout(save, 500); }
        function load() {
          if (!topic) return;
          try {
            var raw = localStorage.getItem(key()); if (!raw) return;
            var d = JSON.parse(raw); if (!d) return;
            if (d.bg) { committedBg = d.bg; board.setBackground(d.bg); }
            if (Array.isArray(d.strokes) && board.setChildStrokes) board.setChildStrokes(d.strokes);
            if (d.view && board.setView) board.setView(d.view); // אחרי שחזור הציורים, להחזיר את המיקום
          } catch (e) { /* JSON פגום — מתעלמים */ }
        }
        load();
        if (board.onChildStroke) board.onChildStroke(saveSoon);     // ציור חדש
        window.addEventListener("pointerup", saveSoon, true);        // סוף גרירה/מחיקה/הזזה
        window.addEventListener("wheel", function () { saveSoon(); }, { passive: true }); // זום
        window.addEventListener("pagehide", save);
        document.addEventListener("visibilitychange", function () { if (document.hidden) save(); });
        // API לבורר הרקע: שמירת הרקע ה"מחויב" (לא התצוגה-המקדימה)
        window.velaBoardMem = {
          getBg: function () { return committedBg; },
          setBg: function (bg) { committedBg = bg; board.setBackground(bg); saveSoon(); },
        };
      })();

      // ───────── בורר רקע הלוח (משבצות / נקודות / חלק) ─────────
      (function bgPicker() {
        var wrap = document.getElementById("bgPicker");
        var opts = Array.prototype.slice.call(wrap.querySelectorAll(".bgOpt"));
        var ORDER = ["grid", "dots", "blank"]; // סדר קבוע של שתי האפשרויות שנפרשות
        var mem = window.velaBoardMem;
        function committed() { return mem ? mem.getBg() : (board.background || "grid"); }
        var current = committed();
        var closeT = null;

        function layout(cur) {
          var others = ORDER.filter(function (b) { return b !== cur; });
          opts.forEach(function (btn) {
            var isCur = btn.dataset.bg === cur;
            btn.classList.toggle("is-current", isCur);
            btn.style.setProperty("--i", isCur ? 0 : others.indexOf(btn.dataset.bg) + 1);
            btn.setAttribute("aria-pressed", isCur ? "true" : "false");
          });
        }
        // ריחוף פותח/סוגר רק במכשירי עכבר אמיתי — אחרת אירועי-עכבר מסונתזים במגע פותחים וסוגרים בנגיעה אחת
        var canHover = !window.matchMedia || window.matchMedia("(hover: hover) and (pointer: fine)").matches;

        }

          var shift = row.offsetWidth / 2 - (btn.offsetLeft + btn.offsetWidth / 2);

        }

          activeBtn = null;

        toolDial.addEventListener("mouseenter", function () { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } });
        toolDial.addEventListener("mouseleave", closeSoon);

          colorBtn.style.background = curColor;
          thicks.forEach(function (b) { b.classList.toggle("active", +b.dataset.w === sel.width); });
          fillBtn.classList.toggle("active", !!sel.fill);
          // לטקסט אין עובי-קו/מילוי — מסתירים אותם (ואת המפרידים שלפניהם) שלא יהיו פקדים מתים.
          var isText = sel.type === "text";
          [thickGroup, fillBtn].forEach(function (el) {
            if (!el) return;
            el.style.display = isText ? "none" : "";
            var sep = el.previousElementSibling;
            if (sep && sep.classList.contains("propsBar__sep")) sep.style.display = isText ? "none" : "";
          });
        }

        // ── פס הקשת: פתיחה, מיקום הנקודה, וגרירה לבחירת גוון ──
        function closePicking() { bar.classList.remove("is-picking"); }
        function openPicking() {
          var h = colorToHue(curColor); if (h == null) h = 175;
          positionDotByHue(h); dot.style.background = curColor;
          bar.classList.add("is-picking");
        }
        function hueFromClientX(clientX) {
          var r = track.getBoundingClientRect();
          var f = r.width ? (clientX - r.left) / r.width : 0;
          return Math.max(0, Math.min(1, f)) * 360;
        }
        function applyHue(h) {
          var hex = hslToHex(h, 88, 52);
          curColor = hex; board.setSelectedColor(hex);
          colorBtn.style.background = hex; dot.style.background = hex; positionDotByHue(h);
        }
        var dragging = false;
        function startDrag(e) {
          dragging = true; applyHue(hueFromClientX(e.clientX)); e.preventDefault();
          if (dot.setPointerCapture && e.pointerId != null) { try { dot.setPointerCapture(e.pointerId); } catch (err) {} }
        }
        colorBtn.addEventListener("click", openPicking);
        var propBack = document.getElementById("propBack");
        if (propBack) propBack.addEventListener("click", closePicking);
        track.addEventListener("pointerdown", startDrag);
        dot.addEventListener("pointerdown", startDrag);
        document.addEventListener("pointermove", function (e) { if (dragging) applyHue(hueFromClientX(e.clientX)); });
        document.addEventListener("pointerup", function () { dragging = false; });
        // לחיצה מחוץ לסרגל (או Esc) סוגרת את פס הקשת
        document.addEventListener("pointerdown", function (e) {
          if (!bar.classList.contains("is-picking") || dragging) return;
          if (bar.contains(e.target)) return;
          closePicking();
        });
        document.addEventListener("keydown", function (e) { if (e.key === "Escape") closePicking(); });

        // כשבוחרים אובייקט — החוגה נסגרת בעדינות והתפריט נפתח; בביטול — להפך (חלק).
        board.onSelectionChange(function (sel) {
          closePicking(); // מעבר אובייקט / ביטול → לסגור את פס הקשת
          if (sel) { dialEl.classList.add("is-hidden"); bar.classList.add("is-show"); sync(sel); }
          else { bar.classList.remove("is-show"); dialEl.classList.remove("is-hidden"); }
        });

        thicks.forEach(function (b) { b.addEventListener("click", function () { board.setSelectedWidth(+b.dataset.w); }); });
        fillBtn.addEventListener("click", function () { board.toggleSelectedFill(); });
        delBtn.addEventListener("click", function () { board.deleteSelected(); });

        // מקלדת: Delete / Backspace מוחקים את האובייקט הנבחר (אך לא בזמן הקלדה בשדה טקסט)
        document.addEventListener("keydown", function (e) {
          if (e.key !== "Delete" && e.key !== "Backspace") return;
          var t = e.target;
          if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
          if (board.getSelectedExId && board.getSelectedExId()) { e.preventDefault(); board.deleteSelectedExercise(); return; }
          if (board.getSelected && board.getSelected()) {
            e.preventDefault();
            board.deleteSelected();
          }
        });
      })();

      // ───────── "המורה מבין מה ציירתי" ─────────
      (function understand() {
        var askChip = document.getElementById("askChip");
        var askOk = document.getElementById("askOk");
        var G = window.VelaBoard._geom;

        // הופך את תוכן הלוח לתיאור עברי קצר (מנצל שאנחנו יודעים באיזה כלי צוירה כל צורה).
        function describeBoard(scene) {
          var items = (scene && scene.childStrokes) || [];
          var out = [];
          for (var i = 0; i < items.length; i++) {
            var s = items[i];
            if (s.type === "text") { out.push('הכיתוב "' + s.text + '"'); continue; }
            if (s.kind === "line") { out.push("קו ישר"); continue; }
            if (s.kind === "angle") {
              var p = s.points, deg = Math.round((G.angleAt(p[0], p[1], p[2]) * 180) / Math.PI);
              out.push("זווית של כ-" + deg + " מעלות"); continue;
            }
            if (s.kind === "shape_triangle") { out.push("משולש" + (s.fill ? " מלא" : "")); continue; }
            if (s.kind === "shape_circle") { out.push("עיגול" + (s.fill ? " מלא" : "")); continue; }
            if (s.kind === "rect" || s.kind === "shape_square") {
              var bb = G.bboxOf(s.points), w = bb.maxX - bb.minX, h = bb.maxY - bb.minY;
              var sq = Math.abs(w - h) < 0.2 * Math.max(w, h);
              out.push((sq ? "ריבוע" : "מלבן") + (s.fill ? " מלא" : "")); continue;
            }
            // קשקוש חופשי — סיווג אוטומטי
            var c = G.classifyStroke(s.points);
            if (c.kind === "circle") out.push("עיגול");
            else if (c.kind === "triangle") out.push("משולש");
            else if (c.kind === "quad") out.push("מרובע");
            else if (c.kind === "polygon") out.push("צורה עם " + c.corners + " צלעות");
            else if (c.kind === "line") out.push("קו");
            else if (c.kind === "curve") out.push("קו מתעקל");
            else out.push("ציור חופשי");
          }
          return out;
        }

        // אחרי כל ציור — מציגים את החלונית. עד שלא לוחצים ✓, המורה לא עושה כלום.
        board.onDraw(function () { askChip.classList.add("is-show"); });

        askOk.addEventListener("click", function () {
          askChip.classList.remove("is-show");
          // המורה רואה את הציור כתמונה ועונה בבועה לידו (לא בצ'אט).
          var img = board.exportPNG ? board.exportPNG() : null;
          if (img && window.velaSeeBoard) window.velaSeeBoard(img);
          else if (window.velaBubble) window.velaBubble("הלוח עוד ריק — צייר משהו ואני אסתכל 🙂");
        });
      })();

      // ───────── קונפטי (תשובה נכונה) ─────────
      (function confetti() {
        var CC = ["#0d9488", "#f97316", "#fbbf24", "#8b5cf6", "#22c55e", "#ef4444"];
        window.velaConfetti = function () {
          var cv = document.createElement("canvas");
          cv.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:60";
          cv.width = window.innerWidth; cv.height = window.innerHeight;
          document.body.appendChild(cv);
          var ctx = cv.getContext("2d"), parts = [];
          for (var i = 0; i < 100; i++) parts.push({ x: cv.width / 2, y: cv.height * 0.32, vx: (Math.random() - 0.5) * 15, vy: Math.random() * -13 - 3, g: 0.4 + Math.random() * 0.3, c: CC[i % CC.length], s: 6 + Math.random() * 7, rot: Math.random() * 6, vr: (Math.random() - 0.5) * 0.5 });
          var start = performance.now();
          (function frame(t) {
            ctx.clearRect(0, 0, cv.width, cv.height);
            var alive = false;
            for (var i = 0; i < parts.length; i++) {
              var p = parts[i]; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
              if (p.y < cv.height + 24) alive = true;
              ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.62); ctx.restore();
            }
            if (alive && t - start < 2600) requestAnimationFrame(frame); else cv.remove();
          })(start);
        };
      })();

      // ───────── תיבות-תשובה (כמה במקביל; בדיקה אוטומטית מול התשובה שהמורה הגדיר) ─────────
      (function answerBoxes() {
        var inputs = {}; // id → input
        var boxes = [];  // המצב הנוכחי

        function boxById(id) { for (var i = 0; i < boxes.length; i++) if (boxes[i].id === id) return boxes[i]; return null; }
        function firstOpen() { for (var i = 0; i < boxes.length; i++) if (boxes[i].status === "open") return boxes[i]; return boxes[0] || null; }
        function normNum(s) { var n = parseFloat(String(s).replace(/\s+/g, "").replace(",", ".")); return isFinite(n) ? n : null; }

        function makeInput(id) {
          var el = document.createElement("input");
          el.className = "answerInput"; el.type = "text"; el.autocomplete = "off";
          el.setAttribute("data-boxid", id); el.setAttribute("aria-label", "תשובה");
          el.addEventListener("input", function () { var b = boxById(id); if (b && b.status === "wrong") { b.status = "open"; board.setAnswerStatusById(id, "open"); } });
          el.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); submit(id, el.value); } });
          document.body.appendChild(el);
          return el;
        }

        function place() {
          var rects = board.getAnswerBoxRects ? board.getAnswerBoxRects() : [], seen = {};
          for (var i = 0; i < rects.length; i++) {
            var r = rects[i], el = inputs[r.id]; if (!el) continue; seen[r.id] = 1;
            el.classList.add("is-show");
            el.style.left = r.left + "px"; el.style.top = r.top + "px";
            el.style.width = r.width + "px"; el.style.height = r.height + "px";
            el.style.lineHeight = r.height + "px"; el.style.fontSize = Math.max(14, Math.round(r.height * 0.46)) + "px";
            if (r.kind === "text") { el.style.textAlign = "right"; el.dir = "rtl"; } else { el.style.textAlign = "center"; el.dir = "ltr"; }
          }
          Object.keys(inputs).forEach(function (id) { if (!seen[id]) inputs[id].classList.remove("is-show"); });
        }

        board.onAnswerBoxes(function (list) {
          boxes = list.map(function (b) { return { id: b.id, kind: b.kind, answer: b.answer, status: b.status }; });
          var ids = {};
          boxes.forEach(function (b) { ids[b.id] = 1; if (!inputs[b.id]) inputs[b.id] = makeInput(b.id); });
          Object.keys(inputs).forEach(function (id) { if (!ids[id]) { inputs[id].remove(); delete inputs[id]; } });
          place();
          var f = firstOpen();
          if (f && inputs[f.id]) setTimeout(function () { inputs[f.id].focus(); }, 60);
        });
        board.onRender(place);

        function submit(id, value) {
          var b = boxById(id); if (!b || b.status === "correct") return; // כבר נפתר → לא לבדוק שוב
          var val = String(value).trim(); if (!val) return;
          var correct;
          if (b.kind === "number") { var a = normNum(b.answer), bb = normNum(val); correct = a != null && bb != null && Math.abs(a - bb) < 1e-6; }
          else if (b.answer) correct = val.toLowerCase() === String(b.answer).trim().toLowerCase();
          else correct = null; // טקסט בלי תשובה ידועה → המורה יבדוק

          if (correct === true) {
            b.status = "correct"; board.setAnswerStatusById(id, "correct");
            if (inputs[id]) { inputs[id].blur(); inputs[id].readOnly = true; } // נעילת תיבה שנפתרה
            var allDone = boxes.length > 0 && boxes.every(function (x) { return x.status === "correct"; });
            if (allDone) {
              if (window.velaConfetti) window.velaConfetti();
              if (board.tool) board.tool("clear_board", {}); // לוח נקי לסבב חדש (מאפס מונה השורות ומסיר תיבות ישנות)
              if (window.velaTeachFollowup) window.velaTeachFollowup("(הילד פתר נכון את כל התרגילים. שבח אותו בחום במשפט קצר, ותן סבב חדש של תרגילים באותו נושא עם draw_exercise.)");
            }
          } else if (correct === false) {
            b.status = "wrong"; board.setAnswerStatusById(id, "wrong");
            if (window.velaBubble) window.velaBubble("כמעט! נסה/י שוב 🙂");
          } else {
            if (window.velaTeachFollowup) window.velaTeachFollowup("(הילד ענה על שאלה מילולית: '" + val + "'. בדוק אם נכון; אם כן שבח ותן הבאה, אם לא עודד לנסות שוב.)");
          }
        }
      })();

      // ───────── עורך טקסט inline (כלי הטקסט) ─────────
      (function textEditor() {
        var ed = document.createElement("div");
        ed.id = "textEditor"; ed.contentEditable = "true";
        ed.setAttribute("aria-label", "כתיבת טקסט על הלוח");
        document.body.appendChild(ed);
        var active = null;

        function place() {
          if (!active) { ed.style.display = "none"; return; }
          var c = board.worldToScreen(active.x, active.y);
          ed.style.display = "block";
          ed.style.left = c.x + "px"; ed.style.top = c.y + "px";
          ed.style.fontSize = Math.max(13, Math.round(30 * c.sy)) + "px";
        }
        function finish(keep) {
          if (!active) return;
          var a = active; active = null;
          var text = (ed.textContent || "").trim();
          ed.style.display = "none"; ed.textContent = "";
          if (keep && text && board.addTextObject) board.addTextObject(a.x, a.y, text);
        }
        board.onTextEdit(function (pt) {
          if (active) finish(true); // לסיים טקסט קודם לפני שמתחילים חדש
          active = { x: pt.x, y: pt.y }; ed.textContent = "";
          place(); setTimeout(function () { ed.focus(); }, 30);
        });
        board.onRender(function () { if (active) place(); });
        ed.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); finish(true); }
          else if (e.key === "Escape") { e.preventDefault(); finish(false); }
        });
        ed.addEventListener("blur", function () { finish(true); });
      })();

      // שם הנושא שהגענו ממנו (?topic=...)
      var topic = new URLSearchParams(location.search).get("topic");
      if (topic) {
        document.getElementById("topicName").textContent = topic;
        document.getElementById("topicChip").hidden = false;
        document.title = topic + " — אזור הלמידה";
      }
    </script>
  </body>
