<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מערכת לימוד – בית</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Assistant:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      @font-face {
        font-family: "Dana Yad";
        src:
          url("/fonts/DanaYadAlefAlefAlef-Normal.woff") format("woff"),
          url("/fonts/DanaYadAlefAlefAlef-Normal.otf") format("opentype");
        font-weight: normal;
        font-display: swap;
      }

      /* ===== מסך בית — קונספט "בית למידה חם" (גרסה חדשה) ===== */
      .homeBody {
        background:
          radial-gradient(820px 520px at 88% -6%, rgba(249, 168, 96, 0.16), transparent 60%),
          radial-gradient(760px 560px at 6% 8%, rgba(20, 184, 166, 0.16), transparent 58%),
          radial-gradient(700px 620px at 60% 116%, rgba(139, 124, 240, 0.12), transparent 60%),
          #eef6f4;
      }
      .home {
        overflow: hidden;
      }

      /* סמלי מתמטיקה מרחפים — מרקם משחקי עדין (לא אימוג'ים) */
      .home__glyphs {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .home__glyphs span {
        position: absolute;
        font-family: "Fredoka", sans-serif;
        font-weight: 600;
        color: rgba(13, 148, 136, 0.13);
        animation: floaty 9s ease-in-out infinite;
      }
      @keyframes floaty {
        50% {
          transform: translateY(-16px) rotate(var(--r, 6deg));
        }
      }

      /* רקע "vela" עדין מאוד */
      .home .home__bg {
        color: rgba(13, 60, 53, 0.05);
      }

      /* מותג */
      .home .brand__mark {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: linear-gradient(140deg, #16c4b2, #0d9488);
        color: #fff;
        font-size: 22px;
        box-shadow: 0 8px 18px rgba(13, 148, 136, 0.32);
      }
      .home .brand__title {
        font-family: "Fredoka", sans-serif;
        font-weight: 700;
        font-size: 20px;
        color: #0f3b36;
      }

      /* היררכיית גיבור */
      .home__hero {
        gap: 4px;
        z-index: 2;
      }
      .home .home__greeting {
        font-family: "Dana Yad", cursive;
        font-size: clamp(46px, 8vw, 92px);
        line-height: 1.12;
        font-weight: 700;
        color: #0f3b36;
        -webkit-text-stroke: 0.5px #0f3b36;
        margin: 0;
      }
      .home .home__greeting .ch {
        opacity: 0;
        display: inline-block;
        white-space: pre;
      }
      .home .home__greeting .ch--on {
        animation: handWrite 0.22s ease-out both;
      }
      @keyframes handWrite {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.85);
          filter: blur(1.5px);
        }
        to {
          opacity: 1;
          transform: none;
          filter: blur(0);
        }
      }
      .home .home__subtitle {
        font-size: clamp(16px, 2.4vw, 20px);
        font-weight: 600;
        color: #4a6b66;
        margin: 4px 0 30px;
      }

      /* כרטיסי פעולה — א-סימטריים: תרגול גדול ומוביל, למידה משני */
      .home .home__cards {
        grid-template-columns: 1.5fr 1fr;
        gap: 18px;
        width: min(680px, 100%);
        align-items: stretch;
        animation: riseIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
      }
      .home .homeCard {
        align-items: flex-start;
        text-align: start;
        gap: 10px;
        padding: 28px 26px;
        border: none;
        border-radius: 28px;
        position: relative;
        overflow: hidden;
      }
      .home .homeCard__icon {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        font-size: 34px;
        margin-bottom: 4px;
      }
      .home .homeCard__title {
        font-family: "Fredoka", sans-serif;
        font-size: 26px;
        font-weight: 700;
      }
      .home .homeCard__desc {
        font-size: 15px;
        line-height: 1.5;
      }
      .home .homeCard:hover {
        transform: translateY(-6px) scale(1.02);
      }

      /* תרגול — פאנל טורקיז עשיר עם חץ */
      .home .homeCard--primary {
        background: linear-gradient(155deg, #17ccb8 0%, #0d9488 100%);
        color: #fff;
        box-shadow: 0 18px 40px rgba(13, 148, 136, 0.36);
        justify-content: space-between;
        min-height: 188px;
      }
      .home .homeCard--primary .homeCard__icon {
        background: rgba(255, 255, 255, 0.2);
      }
      .home .homeCard--primary .homeCard__desc {
        color: rgba(255, 255, 255, 0.92);
      }
      .home .homeCard--primary::after {
        content: "←";
        position: absolute;
        bottom: 22px;
        left: 24px;
        font-size: 26px;
        font-weight: 700;
        opacity: 0.9;
        transition: transform 0.25s ease;
      }
      .home .homeCard--primary:hover::after {
        transform: translateX(-6px);
      }

      /* למידה (בקרוב) — כרטיס חמים ורך, משני */
      .home .homeCard--soon {
        background: #fff4e8;
        color: #8a4b1f;
        box-shadow: 0 10px 26px rgba(180, 120, 60, 0.15);
        justify-content: center;
      }
      .home .homeCard--soon .homeCard__icon {
        background: #ffe2c2;
      }
      .home .homeCard--soon .homeCard__title {
        color: #7c4419;
      }
      .home .homeCard--soon .homeCard__desc {
        align-self: flex-start;
        color: #c2410c;
        font-weight: 700;
        background: #ffe0c0;
        padding: 3px 14px;
        border-radius: 999px;
        font-size: 13px;
      }

      /* סטטיסטיקות — אריחים רכים וצבעוניים */
      .home .home__statsTitle {
        font-family: "Fredoka", sans-serif;
        font-weight: 700;
        color: #0f3b36;
      }
      .home .statCard {
        border: none;
        border-radius: 22px;
        padding: 22px 12px;
        box-shadow: 0 8px 18px rgba(2, 6, 23, 0.05);
      }
      .home .statCard__value {
        font-family: "Fredoka", sans-serif;
        font-size: 32px;
      }
      .home .statCard__label {
        color: #5a6b68;
        font-weight: 500;
      }
      .home .home__statsGrid .statCard:nth-child(1) {
        background: #d6f4ef;
      }
      .home .home__statsGrid .statCard:nth-child(1) .statCard__value {
        color: #0d9488;
      }
      .home .home__statsGrid .statCard:nth-child(2) {
        background: #ffe7df;
      }
      .home .home__statsGrid .statCard:nth-child(2) .statCard__value {
        color: #ef6c4d;
      }
      .home .home__statsGrid .statCard:nth-child(3) {
        background: #fff0c9;
      }
      .home .home__statsGrid .statCard:nth-child(3) .statCard__value {
        color: #d99409;
      }
      .home .home__statsGrid .statCard:nth-child(4) {
        background: #eae6ff;
      }
      .home .home__statsGrid .statCard:nth-child(4) .statCard__value {
        color: #7c6cf0;
      }

      @media (max-width: 560px) {
        .home .home__cards {
          grid-template-columns: 1fr;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .home__glyphs span {
          animation: none;
        }
        .home .home__cards {
          animation: none;
        }
        .home .home__greeting .ch {
          opacity: 1;
        }
        .home .home__greeting .ch--on {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="homeBody">
    <main class="home">
      <div class="home__bg" aria-hidden="true">vela</div>
      <div class="home__glyphs" aria-hidden="true">
        <span style="top: 14%; right: 8%; font-size: 84px; --r: 8deg; animation-delay: 0s">+</span>
        <span style="top: 24%; left: 10%; font-size: 64px; --r: -10deg; animation-delay: 1.2s">×</span>
        <span style="top: 62%; right: 14%; font-size: 72px; --r: 7deg; animation-delay: 2.1s">÷</span>
        <span style="top: 72%; left: 12%; font-size: 90px; --r: -6deg; animation-delay: 0.6s">=</span>
        <span style="top: 44%; left: 4%; font-size: 56px; --r: 12deg; animation-delay: 1.8s">7</span>
        <span style="top: 38%; right: 4%; font-size: 60px; --r: -8deg; animation-delay: 2.6s">★</span>
        <span style="top: 84%; right: 40%; font-size: 50px; --r: 9deg; animation-delay: 1s">−</span>
      </div>

      <header class="home__top">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">∑</div>
          <div class="brand__text">
            <div class="brand__title">Vela</div>
          </div>
        </div>
        <div class="home__topRight">
          <span id="userChip" class="userChip" hidden>
            <span class="userChip__icon" aria-hidden="true">👤</span>
            <span id="homeName" class="userChip__name"></span>
          </span>
          <div class="menuWrap">
            <button id="menuBtn" class="hamburger" type="button" aria-label="תפריט" aria-expanded="false">
              <span></span><span></span><span></span>
            </button>
            <div id="menu" class="menu">
              <a href="/progress" class="menu__item" id="progressItem" style="text-decoration: none">📊 ההתקדמות שלי</a>
              <button id="logoutItem" class="menu__item menu__item--danger" type="button">התנתקות</button>
            </div>
          </div>
        </div>
      </header>

      <section class="home__hero">
        <h1 class="home__greeting">שלום<span id="greetName"></span>! 👋</h1>
        <p class="home__subtitle">מה עושים היום?</p>

        <div class="home__cards">
          <a class="homeCard homeCard--primary" href="/practice">
            <div class="homeCard__icon" aria-hidden="true">✏️</div>
            <div>
              <div class="homeCard__title">תרגול</div>
              <div class="homeCard__desc">פותרים שאלות עם המורה החכם</div>
            </div>
          </a>

          <button class="homeCard homeCard--soon" type="button" id="learnCard">
            <div class="homeCard__icon" aria-hidden="true">📚</div>
            <div class="homeCard__title">למידה</div>
            <div class="homeCard__desc">בקרוב</div>
          </button>
        </div>
      </section>

      <section class="home__stats" id="homeStats" aria-label="הנתונים שלי">
        <h2 class="home__statsTitle">הנתונים שלי</h2>
        <div class="home__statsGrid">
          <div class="statCard">
            <div class="statCard__value" id="statSolved">0</div>
            <div class="statCard__label">תרגילים שפתרת</div>
          </div>
          <div class="statCard">
            <div class="statCard__value" id="statAccuracy">—</div>
            <div class="statCard__label">דיוק</div>
          </div>
          <div class="statCard">
            <div class="statCard__value" id="statStreak">0</div>
            <div class="statCard__label">רצף שיא</div>
          </div>
          <div class="statCard">
            <div class="statCard__value" id="statTopics">0</div>
            <div class="statCard__label">נושאים</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (async function () {
        try {
          const res = await fetch("/api/me");
          const data = res.ok ? await res.json() : null;
          if (!data || !data.ok) {
            window.location.href = "/auth";
            return;
          }
          const name = data.user.username || "";
          document.getElementById("homeName").textContent = name;
          document.getElementById("userChip").hidden = false;
          renderHomeStats(data.user.id);
          writeGreeting(name);
        } catch {
          window.location.href = "/auth";
        }
      })();

      function writeGreeting(name) {
        const h1 = document.querySelector(".home__greeting");
        if (!h1) return;
        const full = name ? ("שלום, " + name + "! 👋") : "שלום! 👋";
        const reduce =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        h1.textContent = "";
        if (reduce) {
          h1.textContent = full;
          return;
        }
        const spans = [];
        for (const ch of full) {
          const s = document.createElement("span");
          s.className = "ch";
          s.textContent = ch;
          h1.appendChild(s);
          spans.push(s);
        }
        let i = 0;
        const step = () => {
          if (i >= spans.length) return;
          spans[i].classList.add("ch--on");
          i += 1;
          window.setTimeout(step, 90);
        };
        step();
      }

      function setStat(id, value, suffix) {
        const el = document.getElementById(id);
        if (!el) return;
        if (value === null) {
          el.textContent = "—";
          el.removeAttribute("data-target");
          return;
        }
        el.setAttribute("data-target", String(value));
        if (suffix) el.setAttribute("data-suffix", suffix);
        el.textContent = "0" + (suffix || "");
      }

      function renderHomeStats(userId) {
        const s = { attempts: 0, correct: 0, maxStreak: 0, topics: 0 };
        try {
          const raw = localStorage.getItem("learning-prototype-v1:" + userId);
          if (raw) {
            const st = JSON.parse(raw);
            const topics = (st && st.topicsState && st.topicsState.topics) || [];
            s.topics = topics.length;
            for (const t of topics) {
              s.attempts += t.attempts || 0;
              s.correct += t.correct || 0;
              s.maxStreak = Math.max(s.maxStreak, t.streak || 0);
            }
          }
        } catch {
          /* ignore */
        }
        setStat("statSolved", s.attempts);
        setStat("statAccuracy", s.attempts ? Math.round((s.correct / s.attempts) * 100) : null, "%");
        setStat("statStreak", s.maxStreak);
        setStat("statTopics", s.topics);
      }

      function animateValue(el) {
        const target = parseFloat(el.getAttribute("data-target"));
        if (isNaN(target)) return;
        const suffix = el.getAttribute("data-suffix") || "";
        const reduce =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduce) {
          el.textContent = target + suffix;
          return;
        }
        const dur = 900;
        const start = performance.now();
        function frame(now) {
          const p = Math.min(1, (now - start) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          el.textContent = Math.round(target * eased) + suffix;
          if (p < 1) requestAnimationFrame(frame);
          else el.textContent = target + suffix;
        }
        requestAnimationFrame(frame);
      }

      function animateStats() {
        document.querySelectorAll(".statCard__value[data-target]").forEach(animateValue);
      }

      (function statsReveal() {
        const stats = document.getElementById("homeStats");
        if (!stats) return;
        const reveal = () => {
          stats.classList.add("is-visible");
          animateStats();
        };
        if (!("IntersectionObserver" in window)) {
          reveal();
          return;
        }
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                reveal();
                io.disconnect();
              }
            });
          },
          { threshold: 0.2 }
        );
        io.observe(stats);
      })();

      const menuBtn = document.getElementById("menuBtn");
      const menu = document.getElementById("menu");
      function setMenu(open) {
        menu.classList.toggle("menu--open", open);
        menuBtn.classList.toggle("hamburger--open", open);
        menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
      }
      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        setMenu(!menu.classList.contains("menu--open"));
      });
      document.addEventListener("click", (e) => {
        if (menu.classList.contains("menu--open") && !menu.contains(e.target) && !menuBtn.contains(e.target)) {
          setMenu(false);
        }
      });
      document.getElementById("logoutItem").addEventListener("click", async () => {
        try {
          await fetch("/api/logout", { method: "POST" });
        } catch {
          /* ignore */
        }
        window.location.href = "/auth";
      });

      (function parallax() {
        const bg = document.querySelector(".home__bg");
        if (!bg) return;
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        const MAX = 18;
        let tx = 0, ty = 0, cx = 0, cy = 0;
        window.addEventListener("pointermove", (e) => {
          tx = -(e.clientX / window.innerWidth - 0.5) * MAX;
          ty = -(e.clientY / window.innerHeight - 0.5) * MAX;
        });
        (function tick() {
          cx += (tx - cx) * 0.15;
          cy += (ty - cy) * 0.15;
          bg.style.setProperty("--px", cx.toFixed(2) + "px");
          bg.style.setProperty("--py", cy.toFixed(2) + "px");
          requestAnimationFrame(tick);
        })();
      })();
    </script>
  </body>
</html>
