services:
  - type: web
    name: vela
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # מפתחות מוזנים בלוח הבקרה של Render (לא נשמרים בקוד) — sync:false מבקש אותם שם
      - key: ANTHROPIC_API_KEY
        sync: false
      # סיסמת אזור הניהול (/admin) — חובה להגדיר בלוח הבקרה
      - key: ADMIN_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      # מודל מהיר לשיחות קול
      - key: ANTHROPIC_VOICE_MODEL
        value: claude-haiku-4-5-20251001
      - key: SAFE_CHILD_MODE
        value: "true"
      # קול (אופציונלי): STT/TTS של Azure — בלי זה הצ'אט בכתב עובד רגיל
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      # ===== שמירת נתונים בחינם (חשבונות/התקדמות שורדים deploy והרדמה) =====
      # Upstash Redis (חינמי): כל כתיבה מסתנכרנת לענן, ובעליית השרת הכל משוחזר.
      # יוצרים DB בחינם ב-console.upstash.com ומדביקים כאן את ה-REST URL וה-TOKEN.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
