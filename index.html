<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מערכת לימוד – אבטיפוס</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">∑</div>
          <div class="brand__text">
            <div class="brand__title">מערכת לימוד</div>
            <div class="brand__subtitle">אבטיפוס: תרגול + צ’אט</div>
          </div>
        </div>
      </div>
      <div class="topbar__right">
        <button id="topicsBtn" class="iconBtn" type="button" aria-label="פתיחת תפריט נושאים" aria-haspopup="dialog" aria-expanded="false">
          <span class="iconBtn__icon" aria-hidden="true">☰</span>
        </button>
        <button id="resetBtn" class="btn btn--ghost" type="button">איפוס</button>
      </div>
    </header>

    <div id="topicsOverlay" class="overlay" hidden></div>
    <aside id="topicsDrawer" class="drawer" role="dialog" aria-label="נושאי תרגול" aria-modal="true" hidden>
      <div class="drawer__header">
        <div>
          <div class="drawer__title">נושאי תרגול</div>
          <div class="drawer__subtitle">כל נושא עם צ’אט ושאלות משלו</div>
        </div>
        <button id="topicsCloseBtn" class="iconBtn" type="button" aria-label="סגירת תפריט נושאים">
          <span class="iconBtn__icon" aria-hidden="true">✕</span>
        </button>
      </div>
      <div class="drawer__content">
        <div class="drawer__actions">
          <button id="newTopicBtn" class="btn btn--primary" type="button">נושא חדש</button>
        </div>
        <div id="topicsList" class="topicsList" aria-label="רשימת נושאים"></div>
      </div>
    </aside>

    <main class="layout">
      <button
        id="chatToggleBtn"
        class="chatToggle"
        type="button"
        aria-label="פתיחה/סגירה של הצ’אט"
        aria-expanded="true"
      >
        <span class="chatToggle__icon" aria-hidden="true">◀</span>
      </button>

      <aside id="chatSidebar" class="chatSidebar" aria-label="צ’אט חופשי">
        <div id="chatResizeHandle" class="chatResizeHandle" role="separator" aria-orientation="vertical" aria-label="שינוי רוחב הצ’אט"></div>
        <div class="chatSidebar__inner">
          <div class="chatSidebar__header">
            <div class="chatSidebar__titleWrap">
              <div class="chatSidebar__title">צ’אט עם המורה</div>
              <div class="chatSidebar__subtitle">המורה מדבר איתך — צוות הסוכנים עוזר מאחורי הקלעים</div>
            </div>
            <div class="aiIndicator" id="aiIndicator" title="סטטוס AI">
              <span class="aiIndicator__dot" id="aiDot" aria-hidden="true"></span>
              <span class="aiIndicator__label">AI</span>
            </div>
          </div>

          <div id="chatLog" class="chatLog" aria-label="היסטוריית שיחה"></div>

          <div class="chatComposer">
            <label class="field field--full">
              <span class="field__label">כתוב/י כאן</span>
              <textarea
                id="chatInput"
                class="textarea"
                rows="2"
                placeholder="לדוגמה: לא הבנתי למה עושים קודם כפל…"
              ></textarea>
            </label>
            <button id="sendBtn" class="btn btn--primary" type="button">שלח</button>
          </div>
        </div>
      </aside>

      <section class="panel lesson" aria-label="תרגול מודרך">
        <div class="panel__header">
          <h2 class="panel__title">התרגיל שלך <span id="topicLabel" class="panel__titleSub"></span></h2>
          <div class="pill" id="difficultyPill" title="רמת קושי">רמה: 1</div>
        </div>

        <div class="card">
          <div class="problem">
            <div class="problem__label">שאלה</div>
            <div class="problem__text" id="problemText">טוען…</div>
            <div id="problemDiagram" class="problemDiagram" hidden aria-hidden="true"></div>
          </div>

          <div class="answerRow">
            <label class="field">
              <span class="field__label">התשובה שלי</span>
              <input id="answerInput" class="input" inputmode="numeric" autocomplete="off" placeholder="לדוגמה: 12" />
            </label>
            <button id="checkBtn" class="btn btn--primary" type="button">בדוק</button>
          </div>

          <div class="actions">
            <button id="prevProblemBtn" class="btn btn--secondary" type="button">שאלה קודמת</button>
            <button id="nextProblemBtn" class="btn btn--secondary" type="button">שאלה הבאה</button>
            <button id="hint1Btn" class="btn btn--secondary" type="button">רמז קטן</button>
            <button id="hint2Btn" class="btn btn--secondary" type="button">רמז גדול</button>
            <button id="explainBtn" class="btn btn--secondary" type="button">תסביר</button>
            <button id="newProblemBtn" class="btn btn--ghost" type="button">תרגיל אחר</button>
          </div>

          <div class="feedback feedback--hidden" id="feedbackBox" role="status" aria-live="polite" hidden></div>
        </div>

        <div class="card stats">
          <div class="stats__grid">
            <div class="stat">
              <div class="stat__label">דיוק</div>
              <div class="stat__value" id="accuracyValue">—</div>
            </div>
            <div class="stat">
              <div class="stat__label">רצף הצלחות</div>
              <div class="stat__value" id="streakValue">—</div>
            </div>
            <div class="stat">
              <div class="stat__label">ניסיון</div>
              <div class="stat__value" id="attemptsValue">—</div>
            </div>
          </div>
          <div class="small muted">
            כל ההסברים והרמזים — רק דרך הצ’אט עם המורה (AI).
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="small muted">מערכת לימוד — תרגול עם מורה AI</div>
    </footer>

    <div class="agentDebug" id="agentDebug">
      <button type="button" class="agentDebug__toggle" id="agentDebugToggle" aria-expanded="false">
        <span>סוכנים (זמני)</span>
        <span class="agentDebug__arrow" id="agentDebugArrow" aria-hidden="true">▲</span>
      </button>
      <div class="agentDebug__body" id="agentDebugBody" hidden></div>
    </div>

    <script src="./app.js?v=3" defer></script>
  </body>
</html>
