<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vela — מתמטיקה לפי הקצב של הילד</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Assistant:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./auth.css?v=6" />
  </head>
  <body class="authBody">
    <div class="authWord" aria-hidden="true">vela</div>

    <main class="authCard" aria-label="כניסה והרשמה">
      <p class="authCard__tag">מתמטיקה לפי הקצב של הילד</p>

      <div class="authTabs" role="tablist">
        <span class="authTabs__indicator" aria-hidden="true"></span>
        <button id="tabLogin" class="authTab" type="button" role="tab">כניסה</button>
        <button id="tabRegister" class="authTab" type="button" role="tab">הרשמה</button>
      </div>

      <div id="authError" class="authError" hidden></div>

      <div class="authForms" id="authForms">
        <!-- כניסה -->
        <form id="loginForm" class="authForm" hidden autocomplete="on">
          <label class="authField">
            <span>שם משתמש</span>
            <input id="loginUsername" name="username" type="text" required />
          </label>
          <label class="authField">
            <span>סיסמה</span>
            <div class="pwWrap">
              <input id="loginPassword" name="password" type="password" required />
              <button type="button" class="pwToggle" aria-label="הצג סיסמה">👁</button>
            </div>
          </label>
          <button class="btn btn--primary authSubmit" type="submit">כניסה</button>
        </form>

        <!-- הרשמה -->
        <form id="registerForm" class="authForm" hidden autocomplete="on">
          <label class="authField">
            <span>שם משתמש</span>
            <input id="regUsername" name="username" type="text" required minlength="3" maxlength="24" />
          </label>
          <label class="authField">
            <span>מייל</span>
            <input id="regEmail" name="email" type="email" required />
          </label>
          <div class="authRow">
            <label class="authField">
              <span>גיל</span>
              <input id="regAge" name="age" type="number" min="4" max="120" required />
            </label>
            <label class="authField">
              <span>כיתה</span>
              <select id="regGrade" name="grade" required>
                <option value="" disabled selected>בחר/י</option>
                <option>א'</option><option>ב'</option><option>ג'</option><option>ד'</option>
                <option>ה'</option><option>ו'</option><option>ז'</option><option>ח'</option>
                <option>ט'</option><option>י'</option><option>יא'</option><option>יב'</option>
              </select>
            </label>
          </div>
          <div class="authField">
            <span>בן או בת?</span>
            <input type="hidden" id="regGender" name="gender" />
            <div class="genderPick" role="group" aria-label="בן או בת">
              <button type="button" class="genderBtn" data-gender="male" aria-label="בן" aria-pressed="false">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                  <circle cx="50" cy="50" r="48" fill="#dbeafe" />
                  <path d="M22 94 a28 28 0 0 1 56 0 Z" fill="#3fa3e6" />
                  <circle cx="50" cy="46" r="20" fill="#f7d2ab" />
                  <path d="M30 44 a20 20 0 0 1 40 0 q-20 -13 -40 0 Z" fill="#6b4f2a" />
                  <circle cx="43" cy="47" r="2.6" fill="#33414f" />
                  <circle cx="57" cy="47" r="2.6" fill="#33414f" />
                  <path d="M43 55 q7 6 14 0" stroke="#33414f" stroke-width="2.4" fill="none" stroke-linecap="round" />
                </svg>
              </button>
              <button type="button" class="genderBtn" data-gender="female" aria-label="בת" aria-pressed="false">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                  <circle cx="50" cy="50" r="48" fill="#fde2f3" />
                  <path d="M24 94 a26 26 0 0 1 52 0 Z" fill="#ef7fb6" />
                  <circle cx="28" cy="48" r="9" fill="#6b4f2a" />
                  <circle cx="72" cy="48" r="9" fill="#6b4f2a" />
                  <circle cx="50" cy="46" r="20" fill="#f7d2ab" />
                  <path d="M29 45 a21 21 0 0 1 42 0 q-21 -15 -42 0 Z" fill="#6b4f2a" />
                  <circle cx="43" cy="47" r="2.6" fill="#33414f" />
                  <circle cx="57" cy="47" r="2.6" fill="#33414f" />
                  <path d="M43 55 q7 6 14 0" stroke="#33414f" stroke-width="2.4" fill="none" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
          <label class="authField">
            <span>שם בית הספר</span>
            <input id="regSchool" name="school" type="text" required />
          </label>
          <label class="authField">
            <span>סיסמה (לפחות 6 תווים)</span>
            <div class="pwWrap">
              <input id="regPassword" name="password" type="password" required minlength="6" />
              <button type="button" class="pwToggle" aria-label="הצג סיסמה">👁</button>
            </div>
          </label>
          <button class="btn btn--primary authSubmit" type="submit">יצירת חשבון</button>
        </form>
      </div>
    </main>

    <script src="./auth.js?v=5" defer></script>
  </body>
</html>
