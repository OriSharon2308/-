<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>וֶלָה · אזור הורים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/parent.css?v=5" />
  </head>
  <body>
    <div id="bootView" class="boot"><span class="spin"></span></div>

    <!-- כניסת הורים — התחברות בלבד -->
    <div id="loginView" class="login" hidden>
      <form id="loginForm" class="login__card" autocomplete="on">
        <div class="login__brand">וֶלָה</div>
        <div class="login__title">אזור הורים</div>
        <p class="login__sub">מתחברים עם פרטי החשבון של הילד שלכם</p>
        <label class="login__label" for="pUser">שם משתמש</label>
        <input id="pUser" type="text" class="login__input" autocomplete="username" />
        <label class="login__label" for="pPw" style="margin-top:14px">סיסמה</label>
        <input id="pPw" type="password" class="login__input" autocomplete="current-password" />
        <button type="submit" class="btn btn--primary login__btn">כניסה</button>
        <div id="loginErr" class="login__err" hidden></div>
        <a class="login__back" href="/auth">→ חזרה למסך הכניסה של התלמידים</a>
      </form>
    </div>

    <!-- לוח ההורה -->
    <div id="app" class="app" hidden>
      <header class="topbar">
        <div class="topbar__brand">וֶלָה<span class="topbar__tag">אזור הורים</span></div>
        <button id="logoutBtn" class="btn btn--ghost btn--sm">יציאה</button>
      </header>
      <main id="main" class="main" aria-live="polite"></main>
    </div>

    <!-- חלון פירוט נושא -->
    <div id="modal" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="פירוט נושא">
        <button class="modal__close" data-close aria-label="סגירה"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
        <div id="modalBody" class="modal__body"></div>
      </div>
    </div>

    <script src="/parent.js?v=7"></script>
  </body>
</html>
